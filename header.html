<!-- header.html -->

<style>
  @font-face {
    font-family: 'LOT';
    src: url('Lot-Regular.otf') format('opentype');
    font-display: swap;
  }

  @font-face {
    font-family: 'Agrandir';
    src: url('Agrandir-Thin-Italic.otf') format('opentype');
    font-display: swap;
    font-style: normal;
    font-weight: 100;
  }

  /* اگر این هدر را داخل صفحه‌ای می‌گذاری که reset ندارد، این بخش کمک می‌کند */
  .shab-header,
  .shab-header * {
    box-sizing: border-box;
  }

  /* NAVBAR */
  .shab-header.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 2rem 4rem;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* LOGO */
  .shab-header .navbar-logo {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    text-decoration: none;
  }

  .shab-header .nav-shab-wrap {
    position: relative;
    display: inline-block;
    line-height: 1;
  }

  .shab-header .nav-shab {
    font-family: 'LOT', sans-serif;
    font-size: 2.8rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1;
    display: block;
    background: linear-gradient(90deg, #555, #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }

  .shab-header .nav-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, #5170ff, #ff66c4);
    pointer-events: none;
  }

  .shab-header .nav-visuals {
    font-family: 'Agrandir', sans-serif;
    font-size: 1.1rem;
    font-weight: 100;
    letter-spacing: 0.18em;
    background: linear-gradient(90deg, #5170ff, #ff66c4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 1px;
    display: block;
    user-select: none;
  }

  /* NAVBAR RIGHT */
  .shab-header .nav-right {
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .shab-header .nav-item-wrap {
    position: relative;
    display: flex;
    align-items: center;
    cursor: pointer;
    overflow: visible;
  }

  .shab-header .nav-bullet {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
    transform: translateY(-18px);
    opacity: 0;
    max-width: 0;
    margin-right: 0;
    transition:
      transform 0.4s cubic-bezier(0.4, 2.6, 0.55, 0.9),
      opacity 0.15s ease,
      max-width 0.22s ease,
      margin-right 0.22s ease;
  }

  .shab-header .nav-item-wrap:hover .nav-bullet {
    transform: translateY(0);
    opacity: 1;
    max-width: 14px;
    margin-right: 6px;
  }

  .shab-header .nav-item {
    padding: 0.5rem 0.75rem;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    text-transform: lowercase;
    white-space: nowrap;
    display: inline-block;
    transition:
      color 0.2s ease,
      transform 0.38s cubic-bezier(0.4, 2.6, 0.55, 0.9);
  }

  .shab-header .nav-item-wrap:hover .nav-item {
    color: #fff;
    transform: translateY(4px);
  }

  /* SERVICES WRAP */
  .shab-header .nav-services-wrap {
    position: relative;
    display: flex;
    align-items: center;
    cursor: pointer;
    overflow: visible;
  }

  /* GET IN TOUCH */
  .shab-header .nav-cta-wrap {
    position: relative;
    display: flex;
    align-items: center;
    margin-left: 0.5rem;
    overflow: visible;
    cursor: pointer;
  }

  .shab-header .nav-cta-bullet {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5170ff, #ff66c4);
    flex-shrink: 0;
    transform: translateY(-18px);
    opacity: 0;
    max-width: 0;
    margin-right: 0;
    transition:
      transform 0.4s cubic-bezier(0.4, 2.6, 0.55, 0.9),
      opacity 0.15s ease,
      max-width 0.22s ease,
      margin-right 0.22s ease;
  }

  .shab-header .nav-cta-wrap:hover .nav-cta-bullet {
    transform: translateY(0);
    opacity: 1;
    max-width: 14px;
    margin-right: 6px;
  }

  .shab-header .nav-cta {
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 2rem;
    text-decoration: none;
    text-transform: lowercase;
    white-space: nowrap;
    display: inline-block;
    transition:
      color 0.2s ease,
      border-color 0.2s ease,
      background 0.2s ease,
      padding-left 0.35s cubic-bezier(0.4, 2.4, 0.55, 0.9),
      padding-right 0.35s cubic-bezier(0.4, 2.4, 0.55, 0.9);
  }

  .shab-header .nav-cta-wrap:hover .nav-cta {
    color: #fff;
    border-color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.05);
    padding-left: 2rem;
    padding-right: 2rem;
  }

  /* SERVICES DROPDOWN */
  .shab-header .services-dropdown {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    padding-top: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 999;
  }

  .shab-header .dropdown-inner {
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.5rem;
    min-width: 240px;
    position: relative;
  }

  .shab-header .nav-services-wrap:hover .services-dropdown {
    opacity: 1;
    pointer-events: all;
    transform: translateX(-50%) translateY(0);
  }

  .shab-header .dropdown-inner::before {
    content: '';
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 9px;
    height: 9px;
    background: rgba(10,10,10,0.95);
    border-left: 1px solid rgba(255,255,255,0.08);
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .shab-header .dropdown-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    color: rgba(255,255,255,0.6);
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    transition: color 0.2s ease, background 0.2s ease;
  }

  .shab-header .dropdown-item:hover {
    color: #fff;
    background: rgba(255,255,255,0.04);
  }

  .shab-header .dropdown-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5170ff, #ff66c4);
    flex-shrink: 0;
    opacity: 0;
    transform: scale(0.4);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .shab-header .dropdown-item:hover .dropdown-dot {
    opacity: 1;
    transform: scale(1);
  }

  .shab-header .dropdown-label {
    flex: 1;
  }

  .shab-header .dropdown-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0.25rem 1rem;
  }

  /* RESPONSIVE */
  @media (max-width: 1024px) {
    .shab-header.navbar {
      padding: 1.5rem 2rem;
    }

    .shab-header .nav-shab {
      font-size: 2.2rem;
    }
  }

  @media (max-width: 768px) {
    .shab-header.navbar {
      padding: 1rem 1.5rem;
    }

    .shab-header .nav-shab {
      font-size: 1.9rem;
    }

    .shab-header .nav-right {
      display: none;
    }
  }

  @media (max-width: 480px) {
    .shab-header .nav-shab {
      font-size: 1.6rem;
    }
  }
</style>

<nav class="shab-header navbar">
  <!-- Logo -->
  <a href="#top" class="navbar-logo" aria-label="Shab Visuals Home">
    <div class="nav-shab-wrap" id="navShabWrap">
      <span class="nav-shab" id="navShab">shab</span>
      <div class="nav-line" id="navLineSh"></div>
      <div class="nav-line" id="navLineAb"></div>
    </div>
    <span class="nav-visuals">visuals</span>
  </a>

  <!-- Right Menu -->
  <div class="nav-right">
    <!-- Works -->
    <div class="nav-item-wrap">
      <span class="nav-bullet"></span>
      <a class="nav-item" href="works.html">works</a>
    </div>

    <!-- Services -->
    <div class="nav-item-wrap nav-services-wrap">
      <span class="nav-bullet"></span>
      <span class="nav-item">services</span>

      <div class="services-dropdown">
        <div class="dropdown-inner">
          <a class="dropdown-item" href="#saas">
            <span class="dropdown-dot"></span>

          </a>

          <div class="dropdown-divider"></div>

          <a class="dropdown-item" href="#commercial">

          </a>

          <div class="dropdown-divider"></div>

          <a class="dropdown-item" href="#social">

          <div class="dropdown-divider"></div>

          <a class="dropdown-item" href="#motion">

    </div>

    <!-- About -->
    <div class="nav-item-wrap">

<script>
  (function () {
    function calcHeaderLogoLines(shabEl, wrapEl, lineSh, lineAb) {
      if (!shabEl || !wrapEl || !lineSh || !lineAb) return;

      const fs = parseFloat(getComputedStyle(shabEl).fontSize);
      const ff = getComputedStyle(shabEl).fontFamily;
      const wrapW = wrapEl.offsetWidth;
      const wrapH = wrapEl.offsetHeight;

      if (wrapW === 0) return;

      const cvs = document.createElement('canvas');
      const ctx = cvs.getContext('2d');

      ctx.font = '600 ' + fs + 'px ' + ff;

      const mAll = ctx.measureText('shab');
      const mSh = ctx.measureText('sh');
      const mS = ctx.measureText('s');
      const mSha = ctx.measureText('sha');
      const mA = ctx.measureText('a');

      const ratio = wrapW / mAll.width;
      const shLeft = (mS.width * 0.25) * ratio;
      const shWidth = (mSh.width * 1.05 - mS.width * 0.25) * ratio;
      const abLeft = (mSha.width - mA.width * 0.5) * ratio;
      const abWidth = wrapW - abLeft;

      const ascent = mAll.actualBoundingBoxAscent || fs * 0.75;
      const descent = mAll.actualBoundingBoxDescent || fs * 0.18;
      const topPad = (wrapH - ascent - descent) / 2;

      const shBottomOffset = descent + topPad - 8;
      const abTopOffset = Math.max(0, topPad - 4);

      lineSh.style.left = shLeft + 'px';
      lineSh.style.width = shWidth + 'px';
      lineSh.style.bottom = shBottomOffset + 'px';
      lineSh.style.top = 'auto';
      lineSh.style.opacity = '1';

      lineAb.style.left = abLeft + 'px';
      lineAb.style.width = abWidth + 'px';
      lineAb.style.top = abTopOffset + 'px';
      lineAb.style.bottom = 'auto';
      lineAb.style.opacity = '1';
    }

    function initShabHeader() {
      const navShab = document.getElementById('navShab');
      const navWrap = document.getElementById('navShabWrap');
      const navLineSh = document.getElementById('navLineSh');
      const navLineAb = document.getElementById('navLineAb');

      function updateHeaderLines() {
        calcHeaderLogoLines(navShab, navWrap, navLineSh, navLineAb);
      }

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(updateHeaderLines);
      } else {
        setTimeout(updateHeaderLines, 300);
      }

      window.addEventListener('resize', updateHeaderLines);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initShabHeader);
    } else {
      initShabHeader();
    }
  })();
</script>
