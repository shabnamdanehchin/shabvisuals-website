<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shab Visuals - Works</title>

  <style>
    @font-face{
      font-family:"LOT";
      src:url("fonts/LOT.woff2") format("woff2");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    @font-face{
      font-family:"Agrandir";
      src:url("fonts/Agrandir.woff2") format("woff2");
      font-weight:400 800;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#070707;
      --panel:#111111;
      --text:#f3f1ea;
      --muted:rgba(243,241,234,.58);
      --line:rgba(243,241,234,.12);
      --ease:cubic-bezier(.16,1,.3,1);
      --card-w:clamp(74px, 5vw, 92px);
      --card-h:clamp(128px, 16vw, 188px);
      --gap:10px;
      --rail-y:50vh;
    }

    *{box-sizing:border-box}

    html,
    body{
      margin:0;
      width:100%;
      min-height:100%;
    }

    body{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.04), transparent 30%),
        linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
      color:var(--text);
      font-family:"Agrandir", "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow:hidden;
      cursor:none;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
    }

    .cursor,
    .cursor-follower{
      position:fixed;
      left:0;
      top:0;
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:9999;
      mix-blend-mode:difference;
    }

    .cursor{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
    }

    .cursor-follower{
      width:20px;
      height:20px;
      border:1px solid rgba(255,255,255,.35);
      border-radius:50%;
      transition:
        width .24s var(--ease),
        height .24s var(--ease),
        border-color .24s var(--ease);
    }

    body.is-hovering .cursor-follower{
      width:28px;
      height:28px;
      border-color:rgba(255,255,255,.7);
    }

    .navbar{
      position:fixed;
      inset:0 0 auto 0;
      z-index:120;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      padding:28px 38px;
      pointer-events:none;
    }

    .brand{
      position:relative;
      display:inline-flex;
      flex-direction:column;
      gap:3px;
      pointer-events:auto;
      text-transform:lowercase;
    }

    .brand-shab{
      position:relative;
      font-family:"LOT", "Agrandir", sans-serif;
      font-size:24px;
      line-height:.82;
      letter-spacing:.01em;
      color:#f5f2ea;
    }

    .brand-visuals{
      font-family:"Agrandir", sans-serif;
      font-size:10px;
      line-height:1;
      letter-spacing:.42em;
      text-transform:uppercase;
      color:rgba(245,242,234,.62);
      padding-left:2px;
    }

    .nav-line{
      position:absolute;
      left:0;
      width:100%;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(245,242,234,.74), transparent);
      transform-origin:left center;
      opacity:.72;
    }

    .nav-line.top{
      top:-8px;
    }

    .nav-line.bottom{
      bottom:-8px;
    }

    .nav-menu{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:28px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .nav-item{
      position:relative;
    }

    .nav-link,
    .touch-link{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:0;
      background:transparent;
      color:rgba(243,241,234,.54);
      font-size:11px;
      line-height:1;
      letter-spacing:.2em;
      text-transform:uppercase;
      padding:0;
      cursor:none;
      transition:color .25s var(--ease);
    }

    .nav-link::before,
    .touch-link::before{
      content:"";
      width:5px;
      height:5px;
      border-radius:50%;
      background:#f3f1ea;
      transform:scale(.28);
      opacity:.36;
      transition:
        transform .25s var(--ease),
        opacity .25s var(--ease);
    }

    .nav-link:hover,
    .nav-link.active,
    .touch-link:hover,
    .nav-item:hover .touch-link{
      color:#fff;
    }

    .nav-link:hover::before,
    .nav-link.active::before,
    .touch-link:hover::before,
    .nav-item:hover .touch-link::before{
      opacity:1;
      transform:scale(1);
    }

    .services-dropdown{
      position:absolute;
      right:0;
      top:calc(100% + 18px);
      width:286px;
      padding:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(8,8,8,.82);
      backdrop-filter:blur(18px);
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
      transition:
        opacity .28s var(--ease),
        transform .28s var(--ease);
    }

    .nav-item:hover .services-dropdown,
    .nav-item:focus-within .services-dropdown{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    .services-dropdown a{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:13px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      color:rgba(243,241,234,.66);
      font-size:12px;
      line-height:1.25;
      letter-spacing:.04em;
      transition:
        color .24s var(--ease),
        padding-left .24s var(--ease);
    }

    .services-dropdown a:last-child{
      border-bottom:0;
    }

    .services-dropdown a::after{
      content:"+";
      color:rgba(243,241,234,.36);
      transition:transform .24s var(--ease), color .24s var(--ease);
    }

    .services-dropdown a:hover{
      color:#fff;
      padding-left:16px;
    }

    .services-dropdown a:hover::after{
      color:#fff;
      transform:rotate(45deg);
    }

    .stage{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .rail-guides::before,
    .rail-guides::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--line), transparent);
      z-index:1;
      pointer-events:none;
    }

    .rail-guides::before{
      top:calc(var(--rail-y) - (var(--card-h) / 2) - 24px);
    }

    .rail-guides::after{
      top:calc(var(--rail-y) + (var(--card-h) / 2) + 24px);
    }

    .track-viewport{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .works-track{
      position:absolute;
      left:0;
      top:var(--rail-y);
      display:flex;
      align-items:center;
      gap:var(--gap);
      height:var(--card-h);
      transform:translate3d(0,-50%,0);
      will-change:transform;
      padding-left:34vw;
      padding-right:48vw;
    }

    .work-item{
      position:relative;
      flex:0 0 var(--card-w);
      width:var(--card-w);
      height:var(--card-h);
      border-radius:8px;
      overflow:hidden;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      transform-origin:center center;
      will-change:transform, filter, opacity;
      transition:
        border-color .35s var(--ease),
        box-shadow .35s var(--ease),
        opacity .35s var(--ease),
        filter .35s var(--ease);
      cursor:none;
    }

    .work-item::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 35%, rgba(0,0,0,.26)),
        linear-gradient(0deg, rgba(0,0,0,.18), rgba(0,0,0,.18));
      z-index:2;
      pointer-events:none;
      transition:opacity .4s var(--ease);
    }

    .work-thumb,
    .work-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .work-thumb{
      background-size:cover;
      background-position:center;
      filter:grayscale(1) brightness(.55) saturate(.82);
      transform:scale(1.04);
      transition:
        filter .55s var(--ease),
        transform .55s var(--ease),
        opacity .45s var(--ease);
    }

    .work-video{
      opacity:0;
      transition:opacity .45s var(--ease);
      background:#000;
    }

    .work-meta{
      position:absolute;
      left:0;
      right:0;
      bottom:10px;
      z-index:3;
      padding:0 8px;
      text-align:center;
      font-size:9px;
      line-height:1.25;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 2px 12px rgba(0,0,0,.45);
      pointer-events:none;
    }

    .work-item:hover .work-thumb,
    .work-item.is-hovered .work-thumb{
      filter:grayscale(0) brightness(1) saturate(1.24);
      transform:scale(1.08);
    }

    .work-item:hover::before,
    .work-item.is-hovered::before{
      opacity:.72;
    }

    .work-item.active{
      z-index:30 !important;
      border-color:rgba(255,255,255,.26);
      box-shadow:0 28px 60px rgba(0,0,0,.55);
    }

    .work-item.active .work-thumb{
      filter:grayscale(0) brightness(1) saturate(1.1);
      transform:scale(1.08);
    }

    .work-item.video-playing .work-video{opacity:1}
    .work-item.video-playing .work-thumb{opacity:0}

    .work-item.ghost{
      opacity:.26 !important;
      filter:saturate(.85) !important;
      z-index:8 !important;
    }

    .work-item.faded{
      opacity:.08 !important;
    }

    .project-overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:70;
      opacity:0;
      transition:opacity .45s var(--ease);
    }

    .project-overlay::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.36);
      opacity:0;
      transition:opacity .45s var(--ease);
    }

    .project-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .project-overlay.show::before{
      opacity:1;
    }

    .project-stage{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:min(94vw, 1280px);
      height:min(86vh, 820px);
    }

    .project-card{
      position:absolute;
      left:50%;
      top:48%;
      width:min(88vw, 1080px);
      height:min(78vh, 680px);
      transform:translate(-50%,-50%) scale(.58);
      border-radius:14px;
      overflow:hidden;
      background:#0d0d0d;
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 40px 120px rgba(0,0,0,.72);
      opacity:0;
      transition:
        transform .6s var(--ease),
        opacity .36s var(--ease);
      z-index:3;
    }

    .project-card.show{
      opacity:1;
      transform:translate(-50%,-50%) scale(1);
    }

    .project-card-inner{
      position:relative;
      width:100%;
      height:100%;
    }

    .project-image,
    .project-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .project-image{
      background-size:cover;
      background-position:center;
      filter:grayscale(0) brightness(1) saturate(1.05);
      opacity:1;
      transition:opacity .35s var(--ease);
    }

    .project-video{
      opacity:0;
      transition:opacity .35s var(--ease);
      background:#000;
    }

    .project-card.video-playing .project-video{opacity:1}
    .project-card.video-playing .project-image{opacity:0}

    .project-shade{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.62)),
        linear-gradient(0deg, rgba(0,0,0,.14), rgba(0,0,0,.14));
      z-index:2;
      pointer-events:none;
    }

    .project-title{
      position:absolute;
      left:50%;
      bottom:92px;
      width:min(84vw, 980px);
      transform:translateX(-50%) translateY(18px);
      z-index:4;
      margin:0;
      text-align:center;
      font-size:clamp(42px, 8vw, 124px);
      line-height:.82;
      letter-spacing:0;
      font-weight:800;
      color:#fff;
      text-shadow:0 18px 46px rgba(0,0,0,.5);
      opacity:0;
      transition:
        opacity .45s var(--ease),
        transform .45s var(--ease);
    }

    .project-copy{
      position:absolute;
      left:50%;
      bottom:30px;
      transform:translateX(-50%) translateY(16px);
      width:min(82vw, 780px);
      text-align:center;
      z-index:4;
      opacity:0;
      transition:
        opacity .45s var(--ease),
        transform .45s var(--ease);
    }

    .project-overlay.show .project-title,
    .project-overlay.show .project-copy{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .project-desc{
      margin:0 auto;
      max-width:720px;
      font-size:clamp(13px, 1.15vw, 16px);
      line-height:1.75;
      color:rgba(243,241,234,.8);
    }

    .neighbors{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
    }

    .neighbor-card{
      position:absolute;
      top:50%;
      width:min(34vw, 340px);
      height:min(56vh, 500px);
      border-radius:12px;
      overflow:hidden;
      opacity:0;
      transform:translate(-50%,-50%) scale(.72);
      filter:blur(2px) saturate(.78) brightness(.82);
      transition:
        opacity .4s var(--ease),
        transform .6s var(--ease),
        filter .4s var(--ease);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 25px 80px rgba(0,0,0,.38);
    }

    .neighbor-card.show{
      opacity:.52;
      transform:translate(-50%,-50%) scale(1.12);
    }

    .neighbor-left{
      left:17%;
    }

    .neighbor-right{
      left:83%;
    }

    .neighbor-media{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background-size:cover;
      background-position:center;
    }

    .neighbor-shade{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.34)),
        linear-gradient(0deg, rgba(0,0,0,.26), rgba(0,0,0,.26));
    }

    .close-btn{
      position:fixed;
      top:24px;
      right:24px;
      z-index:140;
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.34);
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
      cursor:none;
    }

    .close-btn.show{
      display:flex;
    }

    @media (max-width: 768px){
      :root{
        --card-w:78px;
        --card-h:140px;
        --gap:10px;
      }

      body{
        cursor:auto;
      }

      .cursor,
      .cursor-follower,
      .close-btn{
        display:none;
      }

      .navbar{
        padding:22px 18px;
        align-items:flex-start;
      }

      .brand-shab{
        font-size:22px;
      }

      .brand-visuals{
        font-size:9px;
        letter-spacing:.34em;
      }

      .nav-menu{
        gap:15px;
      }

      .nav-link,
      .touch-link{
        font-size:9px;
        letter-spacing:.14em;
      }

      .nav-menu .nav-item:nth-child(2),
      .nav-menu .nav-item:nth-child(3){
        display:none;
      }

      .services-dropdown{
        right:0;
        width:240px;
      }

      .works-track{
        padding-left:22vw;
        padding-right:58vw;
      }

      .project-card{
        width:92vw;
        height:68vh;
        top:47%;
        border-radius:12px;
      }

      .project-title{
        bottom:92px;
        width:88vw;
      }

      .project-copy{
        width:88vw;
        bottom:28px;
      }

      .neighbor-card{
        width:38vw;
        height:34vh;
      }

      .neighbor-left{
        left:13%;
      }

      .neighbor-right{
        left:87%;
      }
    }
  </style>
</head>

<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <header class="navbar">
    <a class="brand" href="#" aria-label="Shab Visuals">
      <span class="brand-shab">
        <span class="nav-line top"></span>
        shab
        <span class="nav-line bottom"></span>
      </span>
      <span class="brand-visuals">visuals</span>
    </a>

    <nav aria-label="Primary navigation">
      <ul class="nav-menu">
        <li class="nav-item">
          <a class="nav-link active" href="#">works</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">about</a>
        </li>

        <li class="nav-item">
          <button class="touch-link" type="button">get in touch</button>

          <div class="services-dropdown">
            <a href="#">SaaS & Product Videos</a>
            <a href="#">Commercial & Promo Ads</a>
            <a href="#">Social Media Content</a>
            <a href="#">Motion Graphics & Animation</a>
          </div>
        </li>
      </ul>
    </nav>
  </header>

  <main class="stage rail-guides">
    <div class="track-viewport">
      <div class="works-track" id="worksTrack"></div>
    </div>
  </main>

  <div class="project-overlay" id="projectOverlay">
    <div class="neighbors">
      <div class="neighbor-card neighbor-left" id="neighborLeft">
        <div class="neighbor-media" id="neighborLeftMedia"></div>
        <div class="neighbor-shade"></div>
      </div>

      <div class="neighbor-card neighbor-right" id="neighborRight">
        <div class="neighbor-media" id="neighborRightMedia"></div>
        <div class="neighbor-shade"></div>
      </div>
    </div>

    <div class="project-stage">
      <div class="project-card" id="projectCard">
        <div class="project-card-inner">
          <div class="project-image" id="projectImage"></div>
          <video class="project-video" id="projectVideo" muted playsinline loop></video>
          <div class="project-shade"></div>
          <h1 class="project-title" id="projectTitle">Project</h1>
        </div>
      </div>
    </div>

    <section class="project-copy">
      <p class="project-desc" id="projectDesc"></p>
    </section>
  </div>

  <button class="close-btn" id="closeBtn" aria-label="Close">x</button>

  <script>
    const projects = [
      {
        title: "Project One",
        desc: "A compact cinematic study with controlled motion and editorial restraint.",
        thumb: "linear-gradient(155deg, #242424, #6f6f6f)",
        image: "",
        video: ""
      },
      {
        title: "Project Two",
        desc: "A narrower gallery language focused on hover color and central rhythm.",
        thumb: "linear-gradient(155deg, #232937, #7d94ba)",
        image: "",
        video: ""
      },
      {
        title: "Project Three",
        desc: "A small-format visual sequence balancing sharp framing and motion depth.",
        thumb: "linear-gradient(155deg, #311d1d, #a55e5e)",
        image: "",
        video: ""
      },
      {
        title: "Project Four",
        desc: "An interaction pass inspired by portfolio rails and tactile scroll response.",
        thumb: "linear-gradient(155deg, #1f3023, #72a178)",
        image: "",
        video: ""
      },
      {
        title: "Project Five",
        desc: "A minimal project card system with layered focus around the active work.",
        thumb: "linear-gradient(155deg, #251f34, #8d77c8)",
        image: "",
        video: ""
      },
      {
        title: "Project Six",
        desc: "An editorial carousel where restraint matters more than decorative motion.",
        thumb: "linear-gradient(155deg, #372818, #bf8a49)",
        image: "",
        video: ""
      },
      {
        title: "Project Seven",
        desc: "A rail built around subtle bump physics triggered only during scroll.",
        thumb: "linear-gradient(155deg, #1f2430, #72809b)",
        image: "",
        video: ""
      },
      {
        title: "Project Eight",
        desc: "A darker sequence with live color return on hover and layered click focus.",
        thumb: "linear-gradient(155deg, #271d26, #9a5d85)",
        image: "",
        video: ""
      },
      {
        title: "Project Nine",
        desc: "A centered composition with thin cards and quiet type underneath.",
        thumb: "linear-gradient(155deg, #1f3134, #69a8af)",
        image: "",
        video: ""
      },
      {
        title: "Project Ten",
        desc: "A portfolio rail that enters from the right and reveals itself with wheel input.",
        thumb: "linear-gradient(155deg, #2c2418, #9e8052)",
        image: "",
        video: ""
      },
      {
        title: "Project Eleven",
        desc: "A compact moving strip designed to feel closer to a refined studio site.",
        thumb: "linear-gradient(155deg, #222222, #5a5a5a)",
        image: "",
        video: ""
      }
    ];

    const track = document.getElementById("worksTrack");
    const items = [];
    const projectOverlay = document.getElementById("projectOverlay");
    const projectCard = document.getElementById("projectCard");
    const projectImage = document.getElementById("projectImage");
    const projectVideo = document.getElementById("projectVideo");
    const projectTitle = document.getElementById("projectTitle");
    const projectDesc = document.getElementById("projectDesc");
    const neighborLeft = document.getElementById("neighborLeft");
    const neighborRight = document.getElementById("neighborRight");
    const neighborLeftMedia = document.getElementById("neighborLeftMedia");
    const neighborRightMedia = document.getElementById("neighborRightMedia");
    const closeBtn = document.getElementById("closeBtn");
    const cursor = document.getElementById("cursor");
    const cursorFollower = document.getElementById("cursorFollower");

    let scrollTarget = 0;
    let scrollCurrent = 0;
    let openIndex = -1;
    let bumpEnergy = 0;

    let mx = innerWidth * 0.5;
    let my = innerHeight * 0.5;
    let fx = mx;
    let fy = my;

    function setMediaBackground(el, project) {
      if (project.image) {
        el.style.backgroundImage = `url("${project.image}")`;
        el.style.background = "";
      } else {
        el.style.backgroundImage = "";
        el.style.background = project.thumb;
      }
    }

    projects.forEach((project, index) => {
      const el = document.createElement("article");
      el.className = "work-item";
      el.dataset.index = index;

      el.innerHTML = `
        <div class="work-thumb"></div>
        <video class="work-video" muted playsinline loop ${project.video ? `src="${project.video}"` : ""}></video>
        <div class="work-meta">${project.title}</div>
      `;

      const thumb = el.querySelector(".work-thumb");
      setMediaBackground(thumb, project);

      el.addEventListener("mouseenter", () => {
        document.body.classList.add("is-hovering");
        el.classList.add("is-hovered");
      });

      el.addEventListener("mouseleave", () => {
        document.body.classList.remove("is-hovering");
        el.classList.remove("is-hovered");
      });

      el.addEventListener("click", () => {
        if (openIndex === index) {
          closeProject();
        } else {
          openProject(index);
        }
      });

      track.appendChild(el);
      items.push(el);
    });

    function getBaseOffset() {
      return window.innerWidth * 0.38;
    }

    function getMaxScroll() {
      return Math.max(0, track.scrollWidth - window.innerWidth * 0.92);
    }

    function stopAllVideos() {
      items.forEach((item) => {
        const video = item.querySelector(".work-video");
        item.classList.remove("video-playing");

        if (video) {
          video.pause();
          video.currentTime = 0;
        }
      });

      projectCard.classList.remove("video-playing");
      projectVideo.pause();
      projectVideo.currentTime = 0;
      projectVideo.removeAttribute("src");
      projectVideo.load();
    }

    function openProject(index) {
      openIndex = index;

      const project = projects[index];
      const leftProject = projects[Math.max(0, index - 1)];
      const rightProject = projects[Math.min(projects.length - 1, index + 1)];

      stopAllVideos();

      projectTitle.textContent = project.title;
      projectDesc.textContent = project.desc;

      setMediaBackground(projectImage, project);
      setMediaBackground(neighborLeftMedia, leftProject);
      setMediaBackground(neighborRightMedia, rightProject);

      if (project.video) {
        projectVideo.src = project.video;
        projectCard.classList.add("video-playing");

        const playPromise = projectVideo.play();

        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      }

      neighborLeft.classList.add("show");
      neighborRight.classList.add("show");
      projectOverlay.classList.add("show");
      projectCard.classList.add("show");
      closeBtn.classList.add("show");

      items.forEach((item, i) => {
        item.classList.remove("active", "ghost", "faded");

        if (i === index) {
          item.classList.add("active");
        } else if (i === index - 1 || i === index + 1) {
          item.classList.add("ghost");
        } else {
          item.classList.add("faded");
        }
      });
    }

    function closeProject() {
      openIndex = -1;

      stopAllVideos();

      projectOverlay.classList.remove("show");
      projectCard.classList.remove("show");
      closeBtn.classList.remove("show");
      neighborLeft.classList.remove("show");
      neighborRight.classList.remove("show");

      items.forEach((item) => {
        item.classList.remove("active", "ghost", "faded", "video-playing");
      });
    }

    closeBtn.addEventListener("click", closeProject);

    window.addEventListener("wheel", (e) => {
      if (openIndex !== -1) {
        closeProject();
      }

      scrollTarget += e.deltaY * 0.9;
      scrollTarget = Math.max(0, Math.min(getMaxScroll(), scrollTarget));
      bumpEnergy = Math.min(1, bumpEnergy + Math.abs(e.deltaY) * 0.006);
    }, { passive: true });

    window.addEventListener("mousemove", (e) => {
      mx = e.clientX;
      my = e.clientY;

      cursor.style.left = mx + "px";
      cursor.style.top = my + "px";
    });

    window.addEventListener("resize", () => {
      scrollTarget = Math.max(0, Math.min(getMaxScroll(), scrollTarget));
    });

    function animateTrack() {
      scrollCurrent += (scrollTarget - scrollCurrent) * 0.085;
      bumpEnergy *= 0.9;

      const baseOffset = getBaseOffset();
      const trackX = baseOffset - scrollCurrent;

      track.style.transform = `translate3d(${trackX}px, -50%, 0)`;

      const bumpCenter = window.innerWidth * 0.5;
      const bumpRadius = 135;
      const bumpHeight = 32 * bumpEnergy;

      items.forEach((item, index) => {
        const rect = item.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const dist = center - bumpCenter;
        const closeness = Math.max(0, 1 - Math.abs(dist) / bumpRadius);
        const hill = Math.pow(closeness, 2.25);

        let finalScale = 1 + hill * 0.035 * bumpEnergy;
        let finalY = -bumpHeight * hill;
        let finalRotate = (dist / bumpRadius) * -3.2 * hill * bumpEnergy;

        if (openIndex === index) {
          finalScale = 2.25;
          finalY = -18;
          finalRotate = 0;
          item.style.zIndex = 30;
        } else if (openIndex !== -1 && (index === openIndex - 1 || index === openIndex + 1)) {
          finalScale = 1.6;
          finalY = -8;
          finalRotate *= 0.2;
          item.style.zIndex = 8;
        } else if (openIndex !== -1) {
          finalScale = 0.94;
          item.style.zIndex = 2;
        } else {
          item.style.zIndex = "";
        }

        item.style.transform = `translate3d(0, ${finalY}px, 0) rotate(${finalRotate}deg) scale(${finalScale})`;
      });

      fx += (mx - fx) * 0.12;
      fy += (my - fy) * 0.12;

      cursorFollower.style.left = fx + "px";
      cursorFollower.style.top = fy + "px";

      requestAnimationFrame(animateTrack);
    }

    animateTrack();
  </script>
</body>
</html>
