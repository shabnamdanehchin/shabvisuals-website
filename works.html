<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works</title>
  <style>
    :root{
      --bg:#070707;
      --panel:#111111;
      --text:#f3f1ea;
      --muted:rgba(243,241,234,.58);
      --line:rgba(243,241,234,.12);
      --ease:cubic-bezier(.16,1,.3,1);
      --card-w:clamp(74px, 5vw, 92px);
      --card-h:clamp(128px, 16vw, 188px);
      --gap:10px;
      --rail-y:50vh;
    }

    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%}

    body{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.04), transparent 30%),
        linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
      color:var(--text);
      font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow:hidden;
      cursor:none;
    }

    a{color:inherit;text-decoration:none}

    .cursor,
    .cursor-follower{
      position:fixed;
      left:0;
      top:0;
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:9999;
      mix-blend-mode:difference;
    }

    .cursor{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
    }

    .cursor-follower{
      width:20px;
      height:20px;
      border:1px solid rgba(255,255,255,.35);
      border-radius:50%;
      transition:
        width .24s var(--ease),
        height .24s var(--ease),
        border-color .24s var(--ease);
    }

    body.is-hovering .cursor-follower{
      width:28px;
      height:28px;
      border-color:rgba(255,255,255,.7);
    }

    nav{
      position:fixed;
      inset:0 0 auto 0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:28px 38px;
    }

    .nav-logo{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      opacity:.9;
    }

    .nav-links{
      margin:0;
      padding:0;
      list-style:none;
      display:flex;
      gap:30px;
    }

    .nav-links a{
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      opacity:.46;
      transition:opacity .25s ease;
    }

    .nav-links a.active,
    .nav-links a:hover{
      opacity:1;
    }

    .stage{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .rail-guides::before,
    .rail-guides::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--line), transparent);
      z-index:1;
      pointer-events:none;
    }

    .rail-guides::before{
      top:calc(var(--rail-y) - (var(--card-h) / 2) - 24px);
    }

    .rail-guides::after{
      top:calc(var(--rail-y) + (var(--card-h) / 2) + 24px);
    }

    .track-viewport{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .works-track{
      position:absolute;
      left:0;
      top:var(--rail-y);
      display:flex;
      align-items:center;
      gap:var(--gap);
      height:var(--card-h);
      transform:translate3d(0,-50%,0);
      will-change:transform;
      padding-left:34vw;
      padding-right:48vw;
    }

    .work-item{
      position:relative;
      flex:0 0 var(--card-w);
      width:var(--card-w);
      height:var(--card-h);
      border-radius:10px;
      overflow:hidden;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      transform-origin:center center;
      will-change:transform, filter, opacity;
      transition:
        transform .45s var(--ease),
        border-color .35s var(--ease),
        box-shadow .35s var(--ease),
        opacity .35s var(--ease),
        filter .35s var(--ease);
      cursor:none;
    }

    .work-item::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 35%, rgba(0,0,0,.26)),
        linear-gradient(0deg, rgba(0,0,0,.18), rgba(0,0,0,.18));
      z-index:2;
      pointer-events:none;
      transition:opacity .4s var(--ease);
    }

    .work-thumb,
    .work-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .work-thumb{
      filter:grayscale(1) brightness(.55) saturate(.82);
      transform:scale(1.04);
      transition:
        filter .55s var(--ease),
        transform .55s var(--ease),
        opacity .45s var(--ease);
    }

    .work-video{
      opacity:0;
      transition:opacity .45s var(--ease);
      background:#000;
    }

    .work-meta{
      position:absolute;
      left:0;
      right:0;
      bottom:10px;
      z-index:3;
      padding:0 8px;
      text-align:center;
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 2px 12px rgba(0,0,0,.45);
      pointer-events:none;
    }

    .work-item:hover .work-thumb,
    .work-item.is-hovered .work-thumb{
      filter:grayscale(0) brightness(1) saturate(1.24);
      transform:scale(1.08);
    }

    .work-item:hover::before,
    .work-item.is-hovered::before{
      opacity:.72;
    }

    .work-item.active{
      z-index:30 !important;
      border-color:rgba(255,255,255,.26);
      box-shadow:0 28px 60px rgba(0,0,0,.55);
    }

    .work-item.active .work-thumb{
      filter:grayscale(0) brightness(1) saturate(1.1);
      transform:scale(1.08);
    }

    .work-item.video-playing .work-video{opacity:1}
    .work-item.video-playing .work-thumb{opacity:0}

    .work-item.ghost{
      opacity:.26 !important;
      filter:saturate(.85) !important;
      z-index:8 !important;
    }

    .work-item.faded{
      opacity:.08 !important;
    }

    .project-overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:50;
      opacity:0;
      transition:opacity .45s var(--ease);
    }

    .project-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .project-stage{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:min(92vw, 1240px);
      height:min(84vh, 780px);
    }

    .project-card{
      position:absolute;
      left:50%;
      top:50%;
      width:min(82vw, 940px);
      height:min(78vh, 640px);
      transform:translate(-50%,-50%) scale(.6);
      border-radius:22px;
      overflow:hidden;
      background:#0d0d0d;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 40px 120px rgba(0,0,0,.65);
      opacity:0;
      transition:
        transform .55s var(--ease),
        opacity .35s var(--ease);
      z-index:3;
    }

    .project-card.show{
      opacity:1;
      transform:translate(-50%,-50%) scale(1);
    }

    .project-card-inner{
      position:relative;
      width:100%;
      height:100%;
    }

    .project-image,
    .project-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .project-image{
      filter:grayscale(0) brightness(1) saturate(1.05);
      opacity:1;
      transition:opacity .35s var(--ease);
    }

    .project-video{
      opacity:0;
      transition:opacity .35s var(--ease);
      background:#000;
    }

    .project-card.video-playing .project-video{opacity:1}
    .project-card.video-playing .project-image{opacity:0}

    .project-shade{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.52)),
        linear-gradient(0deg, rgba(0,0,0,.18), rgba(0,0,0,.18));
      z-index:2;
      pointer-events:none;
    }

    .project-copy{
      position:absolute;
      left:50%;
      bottom:34px;
      transform:translateX(-50%);
      width:min(82vw, 980px);
      text-align:center;
      z-index:4;
      opacity:0;
      transition:opacity .45s var(--ease), transform .45s var(--ease);
    }

    .project-overlay.show .project-copy{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .project-title{
      margin:0 0 12px;
      font-size:clamp(34px, 6vw, 88px);
      line-height:.9;
      letter-spacing:-.06em;
      font-weight:800;
      text-transform:none;
      color:#fff;
      text-shadow:0 16px 40px rgba(0,0,0,.42);
    }

    .project-desc{
      margin:0 auto;
      max-width:680px;
      font-size:clamp(13px, 1.2vw, 16px);
      line-height:1.75;
      color:rgba(243,241,234,.78);
    }

    .neighbors{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
    }

    .neighbor-card{
      position:absolute;
      top:50%;
      width:min(30vw, 260px);
      height:min(46vh, 380px);
      border-radius:18px;
      overflow:hidden;
      opacity:0;
      transform:translate(-50%,-50%) scale(.7);
      filter:blur(2px) saturate(.8);
      transition:
        opacity .4s var(--ease),
        transform .55s var(--ease),
        filter .4s var(--ease);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 25px 80px rgba(0,0,0,.35);
    }

    .neighbor-card.show{
      opacity:.6;
    }

    .neighbor-left{
      left:20%;
    }

    .neighbor-right{
      left:80%;
    }

    .neighbor-card .neighbor-media{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .neighbor-card .neighbor-shade{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.3));
    }

    .close-btn{
      position:fixed;
      top:24px;
      right:24px;
      z-index:120;
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.34);
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
      cursor:none;
    }

    .close-btn.show{display:flex}

    @media (max-width: 768px){
      :root{
        --card-w:78px;
        --card-h:140px;
        --gap:10px;
      }

      body{cursor:auto}
      .cursor,.cursor-follower,.close-btn{display:none}
      nav{padding:22px 18px}
      .nav-links{gap:18px}
      .works-track{
        padding-left:22vw;
        padding-right:58vw;
      }

      .project-card{
        width:92vw;
        height:68vh;
      }

      .neighbor-card{
        width:34vw;
        height:26vh;
      }

      .project-copy{
        width:90vw;
        bottom:24px;
      }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <nav>
    <div class="nav-logo">Studio</div>
    <ul class="nav-links">
      <li><a href="#" class="active">Works</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <main class="stage rail-guides">
    <div class="track-viewport">
      <div class="works-track" id="worksTrack"></div>
    </div>
  </main>

  <div class="project-overlay" id="projectOverlay">
    <div class="neighbors">
      <div class="neighbor-card neighbor-left" id="neighborLeft">
        <img class="neighbor-media" id="neighborLeftMedia" alt="" />
        <div class="neighbor-shade"></div>
      </div>
      <div class="neighbor-card neighbor-right" id="neighborRight">
        <img class="neighbor-media" id="neighborRightMedia" alt="" />
        <div class="neighbor-shade"></div>
      </div>
    </div>

    <div class="project-stage">
      <div class="project-card" id="projectCard">
        <img class="project-image" id="projectImage" alt="" />
        <video class="project-video" id="projectVideo" muted playsinline loop></video>
        <div class="project-shade"></div>
      </div>
    </div>

    <section class="project-copy">
      <h1 class="project-title" id="projectTitle">Project</h1>
      <p class="project-desc" id="projectDesc"></p>
    </section>
  </div>

  <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>

  <script>
    const projects = [
      { title: "Project One", desc: "A compact cinematic study with controlled motion and editorial restraint.", thumb: "linear-gradient(155deg, #242424, #6f6f6f)", video: "" },
      { title: "Project Two", desc: "A narrower gallery language focused on hover color and central rhythm.", thumb: "linear-gradient(155deg, #232937, #7d94ba)", video: "" },
      { title: "Project Three", desc: "A small-format visual sequence balancing sharp framing and motion depth.", thumb: "linear-gradient(155deg, #311d1d, #a55e5e)", video: "" },
      { title: "Project Four", desc: "An interaction pass inspired by portfolio rails and tactile scroll response.", thumb: "linear-gradient(155deg, #1f3023, #72a178)", video: "" },
      { title: "Project Five", desc: "A minimal project card system with layered focus around the active work.", thumb: "linear-gradient(155deg, #251f34, #8d77c8)", video: "" },
      { title: "Project Six", desc: "An editorial carousel where restraint matters more than decorative motion.", thumb: "linear-gradient(155deg, #372818, #bf8a49)", video: "" },
      { title: "Project Seven", desc: "A rail built around subtle bump physics triggered only during scroll.", thumb: "linear-gradient(155deg, #1f2430, #72809b)", video: "" },
      { title: "Project Eight", desc: "A darker sequence with live color return on hover and layered click focus.", thumb: "linear-gradient(155deg, #271d26, #9a5d85)", video: "" },
      { title: "Project Nine", desc: "A centered composition with thin cards and quiet type underneath.", thumb: "linear-gradient(155deg, #1f3134, #69a8af)", video: "" },
      { title: "Project Ten", desc: "A portfolio rail that enters from the right and reveals itself with wheel input.", thumb: "linear-gradient(155deg, #2c2418, #9e8052)", video: "" },
      { title: "Project Eleven", desc: "A compact moving strip designed to feel closer to a refined studio site.", thumb: "linear-gradient(155deg, #222222, #5a5a5a)", video: "" }
    ];

    const track = document.getElementById("worksTrack");
    const items = [];
    const projectOverlay = document.getElementById("projectOverlay");
    const projectCard = document.getElementById("projectCard");
    const projectImage = document.getElementById("projectImage");
    const projectVideo = document.getElementById("projectVideo");
    const projectTitle = document.getElementById("projectTitle");
    const projectDesc = document.getElementById("projectDesc");
    const neighborLeft = document.getElementById("neighborLeft");
    const neighborRight = document.getElementById("neighborRight");
    const neighborLeftMedia = document.getElementById("neighborLeftMedia");
    const neighborRightMedia = document.getElementById("neighborRightMedia");
    const closeBtn = document.getElementById("closeBtn");
    const cursor = document.getElementById("cursor");
    const cursorFollower = document.getElementById("cursorFollower");

    let scrollTarget = 0;
    let scrollCurrent = 0;
    let openIndex = -1;

    let mx = innerWidth * 0.5;
    let my = innerHeight * 0.5;
    let fx = mx;
    let fy = my;

    function mediaFromProject(project) {
      return project.video || project.thumb;
    }

    projects.forEach((project, index) => {
      const el = document.createElement("article");
      el.className = "work-item";
      el.dataset.index = index;

      el.innerHTML = `
        <div class="work-thumb" style="background:${project.thumb}"></div>
        <video class="work-video" muted playsinline loop ${project.video ? `src="${project.video}"` : ""}></video>
        <div class="work-meta">${project.title}</div>
      `;

      el.addEventListener("mouseenter", () => {
        document.body.classList.add("is-hovering");
        el.classList.add("is-hovered");
      });

      el.addEventListener("mouseleave", () => {
        document.body.classList.remove("is-hovering");
        el.classList.remove("is-hovered");
      });

      el.addEventListener("click", () => {
        if (openIndex === index) {
          closeProject();
        } else {
          openProject(index);
        }
      });

      track.appendChild(el);
      items.push(el);
    });

    function getBaseOffset() {
      return window.innerWidth * 0.38;
    }

    function getMaxScroll() {
      return Math.max(0, track.scrollWidth - window.innerWidth * 0.92);
    }

    function stopAllVideos() {
      items.forEach((item) => {
        const video = item.querySelector(".work-video");
        item.classList.remove("video-playing");
        if (video) {
          video.pause();
          video.currentTime = 0;
        }
      });

      projectCard.classList.remove("video-playing");
      projectVideo.pause();
      projectVideo.currentTime = 0;
      projectVideo.removeAttribute("src");
      projectVideo.load();
    }

    function openProject(index) {
      openIndex = index;
      const project = projects[index];
      const leftProject = projects[Math.max(0, index - 1)];
      const rightProject = projects[Math.min(projects.length - 1, index + 1)];

      projectTitle.textContent = project.title;
      projectDesc.textContent = project.desc;

      projectImage.style.background = project.thumb;
      projectImage.src = "";
      projectImage.alt = project.title;
      projectImage.style.display = "none";

      if (project.video) {
        projectVideo.src = project.video;
        projectCard.classList.add("video-playing");
        const playPromise = projectVideo.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      } else {
        projectCard.classList.remove("video-playing");
      }

      neighborLeftMedia.src = "";
      neighborRightMedia.src = "";
      neighborLeftMedia.alt = leftProject.title;
      neighborRightMedia.alt = rightProject.title;
      neighborLeftMedia.style.background = leftProject.thumb;
      neighborRightMedia.style.background = rightProject.thumb;
      neighborLeft.classList.add("show");
      neighborRight.classList.add("show");
      neighborLeft.style.transform = "translate(-50%,-50%) scale(1.08)";
      neighborRight.style.transform = "translate(-50%,-50%) scale(1.08)";

      projectOverlay.classList.add("show");
      projectCard.classList.add("show");
      closeBtn.classList.add("show");

      items.forEach((item, i) => {
        item.classList.remove("active", "ghost", "faded");
        if (i === index) {
          item.classList.add("active");
        } else if (i === index - 1 || i === index + 1) {
          item.classList.add("ghost");
        } else {
          item.classList.add("faded");
        }
      });
    }

    function closeProject() {
      openIndex = -1;
      stopAllVideos();
      projectOverlay.classList.remove("show");
      projectCard.classList.remove("show");
      closeBtn.classList.remove("show");
      neighborLeft.classList.remove("show");
      neighborRight.classList.remove("show");
      items.forEach((item) => item.classList.remove("active", "ghost", "faded", "video-playing"));
    }

    closeBtn.addEventListener("click", closeProject);

    window.addEventListener("wheel", (e) => {
      if (openIndex !== -1) {
        closeProject();
      }
      scrollTarget += e.deltaY * 0.9;
      scrollTarget = Math.max(0, Math.min(getMaxScroll(), scrollTarget));
    }, { passive: true });

    window.addEventListener("mousemove", (e) => {
      mx = e.clientX;
      my = e.clientY;
      cursor.style.left = mx + "px";
      cursor.style.top = my + "px";
    });

    window.addEventListener("resize", () => {
      scrollTarget = Math.max(0, Math.min(getMaxScroll(), scrollTarget));
    });

    function animateTrack() {
      scrollCurrent += (scrollTarget - scrollCurrent) * 0.085;

      const baseOffset = getBaseOffset();
      const trackX = baseOffset - scrollCurrent;
      track.style.transform = `translate3d(${trackX}px, -50%, 0)`;

      const bumpCenter = window.innerWidth * 0.5;
      const bumpRadius = 135;
      const bumpHeight = 30;

      items.forEach((item, index) => {
        const rect = item.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const dist = center - bumpCenter;
        const closeness = Math.max(0, 1 - Math.abs(dist) / bumpRadius);
        const hill = Math.pow(closeness, 2.25);

        let finalScale = 1 + hill * 0.035;
        let finalY = -bumpHeight * hill;
        let finalRotate = (dist / bumpRadius) * -2.8 * hill;

        if (openIndex === index) {
          finalScale = 2.25;
          finalY = -18;
          finalRotate = 0;
          item.style.zIndex = 30;
        } else if (openIndex !== -1 && (index === openIndex - 1 || index === openIndex + 1)) {
          finalScale = 1.6;
          finalY = -8;
          finalRotate *= 0.2;
          item.style.zIndex = 8;
        } else if (openIndex !== -1) {
          finalScale = 0.94;
          item.style.zIndex = 2;
        } else {
          item.style.zIndex = "";
        }

        item.style.transform = `translate3d(0, ${finalY}px, 0) rotate(${finalRotate}deg) scale(${finalScale})`;
      });

      fx += (mx - fx) * 0.12;
      fy += (my - fy) * 0.12;
      cursorFollower.style.left = fx + "px";
      cursorFollower.style.top = fy + "px";

      requestAnimationFrame(animateTrack);
    }

    animateTrack();
  </script>
</body>
</html>
