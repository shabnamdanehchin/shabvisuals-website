<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shab Visuals - Works</title>

  <style>
    @font-face{
      font-family:"LOT";
      src:url("fonts/LOT.woff2") format("woff2");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    @font-face{
      font-family:"Agrandir";
      src:url("fonts/Agrandir.woff2") format("woff2");
      font-weight:400 800;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#070707;
      --panel:#111111;
      --text:#f3f1ea;
      --muted:rgba(243,241,234,.58);
      --line:rgba(243,241,234,.12);
      --ease:cubic-bezier(.16,1,.3,1);
      --card-w:clamp(74px, 5vw, 92px);
      --card-h:clamp(128px, 16vw, 188px);
      --gap:10px;
      --rail-y:50vh;
    }

    *{box-sizing:border-box}

    html,
    body{
      margin:0;
      width:100%;
      min-height:100%;
    }

    body{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.04), transparent 30%),
        linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
      color:var(--text);
      font-family:"Agrandir", "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow:hidden;
      cursor:none;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font:inherit;
    }

    .cursor,
    .cursor-follower{
      position:fixed;
      left:0;
      top:0;
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:9999;
      mix-blend-mode:difference;
    }

    .cursor{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
    }

    .cursor-follower{
      width:20px;
      height:20px;
      border:1px solid rgba(255,255,255,.35);
      border-radius:50%;
      transition:
        width .24s var(--ease),
        height .24s var(--ease),
        border-color .24s var(--ease);
    }

    body.is-hovering .cursor-follower{
      width:28px;
      height:28px;
      border-color:rgba(255,255,255,.7);
    }

    .navbar{
      position:fixed;
      top:0; left:0; right:0;
      padding:2rem 4rem;
      z-index:1000;
      display:flex;
      align-items:center;
      justify-content:space-between;
      pointer-events:none;
    }

    .navbar-logo{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      cursor:pointer;
      text-decoration:none;
      pointer-events:auto;
    }

    .nav-shab-wrap{
      position:relative;
      display:inline-block;
      line-height:1;
    }

    .nav-shab{
      font-family:'LOT', sans-serif;
      font-size:2.8rem;
      font-weight:600;
      letter-spacing:0.02em;
      line-height:1;
      display:block;
      background:linear-gradient(90deg, #555, #fff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      user-select:none;
    }

    .nav-line{
      position:absolute;
      height:1px;
      background:linear-gradient(90deg, #5170ff, #ff66c4);
      pointer-events:none;
    }

    .nav-visuals{
      font-family:'Agrandir', sans-serif;
      font-size:1.1rem;
      font-weight:100;
      letter-spacing:0.18em;
      background:linear-gradient(90deg, #5170ff, #ff66c4);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-top:1px;
      display:block;
      user-select:none;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:0.25rem;
      pointer-events:auto;
    }

    .nav-item-wrap{
      position:relative;
      display:flex;
      align-items:center;
      cursor:pointer;
      overflow:visible;
    }

    .nav-bullet{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#fff;
      flex-shrink:0;
      transform:translateY(-18px);
      opacity:0;
      max-width:0;
      margin-right:0;
      transition:
        transform    0.4s cubic-bezier(0.4, 2.6, 0.55, 0.9),
        opacity      0.15s ease,
        max-width    0.22s ease,
        margin-right 0.22s ease;
    }

    .nav-item-wrap:hover .nav-bullet{
      transform:translateY(0);
      opacity:1;
      max-width:14px;
      margin-right:6px;
    }

    .nav-item{
      padding:0.5rem 0.75rem;
      font-size:0.85rem;
      letter-spacing:0.06em;
      color:rgba(255,255,255,0.6);
      text-decoration:none;
      text-transform:lowercase;
      white-space:nowrap;
      display:inline-block;
      transition:
        color     0.2s ease,
        transform 0.38s cubic-bezier(0.4, 2.6, 0.55, 0.9);
    }

    .nav-item-wrap:hover .nav-item{
      color:#fff;
      transform:translateY(4px);
    }

    .nav-services-wrap{
      position:relative;
      display:flex;
      align-items:center;
      cursor:pointer;
      overflow:visible;
    }

    .nav-cta-wrap{
      position:relative;
      display:flex;
      align-items:center;
      margin-left:0.5rem;
      overflow:visible;
      cursor:pointer;
    }

    .nav-cta-bullet{
      width:7px;
      height:7px;
      border-radius:50%;
      background:linear-gradient(135deg, #5170ff, #ff66c4);
      flex-shrink:0;
      transform:translateY(-18px);
      opacity:0;
      max-width:0;
      margin-right:0;
      transition:
        transform    0.4s cubic-bezier(0.4, 2.6, 0.55, 0.9),
        opacity      0.15s ease,
        max-width    0.22s ease,
        margin-right 0.22s ease;
    }

    .nav-cta-wrap:hover .nav-cta-bullet{
      transform:translateY(0);
      opacity:1;
      max-width:14px;
      margin-right:6px;
    }

    .nav-cta{
      padding:0.5rem 1.2rem;
      font-size:0.85rem;
      letter-spacing:0.06em;
      color:rgba(255,255,255,0.75);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:2rem;
      text-decoration:none;
      text-transform:lowercase;
      white-space:nowrap;
      display:inline-block;
      transition:
        color         0.2s ease,
        border-color  0.2s ease,
        background    0.2s ease,
        padding-left  0.35s cubic-bezier(0.4, 2.4, 0.55, 0.9),
        padding-right 0.35s cubic-bezier(0.4, 2.4, 0.55, 0.9);
    }

    .nav-cta-wrap:hover .nav-cta{
      color:#fff;
      border-color:rgba(255,255,255,0.7);
      background:rgba(255,255,255,0.05);
      padding-left:2rem;
      padding-right:2rem;
    }

    .services-dropdown{
      position:absolute;
      top:100%;
      left:50%;
      transform:translateX(-50%) translateY(-6px);
      padding-top:1rem;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.25s ease, transform 0.25s ease;
      z-index:999;
    }

    .dropdown-inner{
      background:rgba(10,10,10,0.95);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:12px;
      padding:0.5rem;
      min-width:240px;
      position:relative;
    }

    .nav-services-wrap:hover .services-dropdown{
      opacity:1;
      pointer-events:all;
      transform:translateX(-50%) translateY(0);
    }

    .dropdown-inner::before{
      content:'';
      position:absolute;
      top:-5px;
      left:50%;
      transform:translateX(-50%) rotate(45deg);
      width:9px;
      height:9px;
      background:rgba(10,10,10,0.95);
      border-left:1px solid rgba(255,255,255,0.08);
      border-top:1px solid rgba(255,255,255,0.08);
    }

    .dropdown-item{
      display:flex;
      align-items:center;
      gap:0.75rem;
      padding:0.75rem 1rem;
      border-radius:8px;
      cursor:pointer;
      text-decoration:none;
      color:rgba(255,255,255,0.6);
      font-size:0.82rem;
      letter-spacing:0.04em;
      transition:color 0.2s ease, background 0.2s ease;
    }

    .dropdown-item:hover{
      color:#fff;
      background:rgba(255,255,255,0.04);
    }

    .dropdown-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      background:linear-gradient(135deg, #5170ff, #ff66c4);
      flex-shrink:0;
      opacity:0;
      transform:scale(0.4);
      transition:opacity 0.2s ease, transform 0.2s ease;
    }

    .dropdown-item:hover .dropdown-dot{
      opacity:1;
      transform:scale(1);
    }

    .dropdown-label{
      flex:1;
    }

    .dropdown-divider{
      height:1px;
      background:rgba(255,255,255,0.06);
      margin:0.25rem 1rem;
    }

    .stage{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .rail-guides::before,
    .rail-guides::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--line), transparent);
      z-index:1;
      pointer-events:none;
    }

    .rail-guides::before{
      top:calc(var(--rail-y) - (var(--card-h) / 2) - 24px);
    }

    .rail-guides::after{
      top:calc(var(--rail-y) + (var(--card-h) / 2) + 24px);
    }

    .track-viewport{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .works-track{
      position:absolute;
      left:0;
      top:var(--rail-y);
      display:flex;
      align-items:center;
      gap:var(--gap);
      height:var(--card-h);
      transform:translate3d(0,-50%,0);
      will-change:transform;
      padding-left:34vw;
      padding-right:48vw;
    }

    .work-item{
      position:relative;
      flex:0 0 var(--card-w);
      width:var(--card-w);
      height:var(--card-h);
      border-radius:8px;
      overflow:hidden;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      transform-origin:center center;
      will-change:transform, filter, opacity;
      transition:
        border-color .35s var(--ease),
        box-shadow .35s var(--ease),
        opacity .35s var(--ease),
        filter .35s var(--ease);
      cursor:none;
    }

    .work-item::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 35%, rgba(0,0,0,.26)),
        linear-gradient(0deg, rgba(0,0,0,.18), rgba(0,0,0,.18));
      z-index:2;
      pointer-events:none;
      transition:opacity .4s var(--ease);
    }

    .work-thumb,
    .work-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .work-thumb{
      background-size:cover;
      background-position:center;
      filter:grayscale(1) brightness(.55) saturate(.82);
      transform:scale(1.04);
      transition:
        filter .55s var(--ease),
        transform .55s var(--ease),
        opacity .45s var(--ease);
    }

    .work-video{
      opacity:0;
      transition:opacity .45s var(--ease);
      background:#000;
    }

    .work-meta{
      position:absolute;
      left:0;
      right:0;
      bottom:10px;
      z-index:3;
      padding:0 8px;
      text-align:center;
      font-size:9px;
      line-height:1.25;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 2px 12px rgba(0,0,0,.45);
      pointer-events:none;
    }

    .work-item:hover .work-thumb,
    .work-item.is-hovered .work-thumb{
      filter:grayscale(0) brightness(1) saturate(1.24);
      transform:scale(1.08);
    }

    .work-item:hover::before,
    .work-item.is-hovered::before{
      opacity:.72;
    }

    .work-item.active{
      z-index:30 !important;
      border-color:rgba(255,255,255,.26);
      box-shadow:0 28px 60px rgba(0,0,0,.55);
    }

    .work-item.active .work-thumb{
      filter:grayscale(0) brightness(1) saturate(1.1);
      transform:scale(1.08);
    }

    .work-item.video-playing .work-video{opacity:1}
    .work-item.video-playing .work-thumb{opacity:0}

    .work-item.ghost{
      opacity:.26 !important;
      filter:saturate(.85) !important;
      z-index:8 !important;
    }

    .work-item.faded{
      opacity:.08 !important;
    }

    .project-overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:70;
      opacity:0;
      transition:opacity .45s var(--ease);
    }

    .project-overlay::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.36);
      opacity:0;
      transition:opacity .45s var(--ease);
    }

    .project-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .project-overlay.show::before{
      opacity:1;
    }

    .project-stage{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:min(94vw, 1280px);
      height:min(86vh, 820px);
    }

    .project-card{
      position:absolute;
      left:50%;
      top:48%;
      width:min(88vw, 1080px);
      height:min(78vh, 680px);
      transform:translate(-50%,-50%) scale(.58);
      border-radius:14px;
      overflow:hidden;
      background:#0d0d0d;
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 40px 120px rgba(0,0,0,.72);
      opacity:0;
      transition:
        transform .6s var(--ease),
        opacity .36s var(--ease);
      z-index:3;
    }

    .project-card.show{
      opacity:1;
      transform:translate(-50%,-50%) scale(1);
    }

    .project-card-inner{
      position:relative;
      width:100%;
      height:100%;
    }

    .project-image,
    .project-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .project-image{
      background-size:cover;
      background-position:center;
      filter:grayscale(0) brightness(1) saturate(1.05);
      opacity:1;
      transition:opacity .35s var(--ease);
    }

    .project-video{
      opacity:0;
      transition:opacity .35s var(--ease);
      background:#000;
    }

    .project-card.video-playing .project-video{opacity:1}
    .project-card.video-playing .project-image{opacity:0}

    .project-shade{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.62)),
        linear-gradient(0deg, rgba(0,0,0,.14), rgba(0,0,0,.14));
      z-index:2;
      pointer-events:none;
    }

    .project-title{
      position:absolute;
      left:50%;
      bottom:92px;
      width:min(84vw, 980px);
      transform:translateX(-50%) translateY(18px);
      z-index:4;
      margin:0;
      text-align:center;
      font-size:clamp(42px, 8vw, 124px);
      line-height:.82;
      letter-spacing:0;
      font-weight:800;
      color:#fff;
      text-shadow:0 18px 46px rgba(0,0,0,.5);
      opacity:0;
      transition:
        opacity .45s var(--ease),
        transform .45s var(--ease);
    }

    .project-copy{
      position:absolute;
      left:50%;
      bottom:30px;
      transform:translateX(-50%) translateY(16px);
      width:min(82vw, 780px);
      text-align:center;
      z-index:4;
      opacity:0;
      transition:
        opacity .45s var(--ease),
        transform .45s var(--ease);
    }

    .project-overlay.show .project-title,
    .project-overlay.show .project-copy{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .project-desc{
      margin:0 auto;
      max-width:720px;
      font-size:clamp(13px, 1.15vw, 16px);
      line-height:1.75;
      color:rgba(243,241,234,.8);
    }

    .neighbors{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
    }

    .neighbor-card{
      position:absolute;
      top:50%;
      width:min(34vw, 340px);
      height:min(56vh, 500px);
      border-radius:12px;
      overflow:hidden;
      opacity:0;
      transform:translate(-50%,-50%) scale(.72);
      filter:blur(2px) saturate(.78) brightness(.82);
      transition:
        opacity .4s var(--ease),
        transform .6s var(--ease),
        filter .4s var(--ease);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 25px 80px rgba(0,0,0,.38);
    }

    .neighbor-card.show{
      opacity:.52;
      transform:translate(-50%,-50%) scale(1.12);
    }

    .neighbor-left{
      left:17%;
    }

    .neighbor-right{
      left:83%;
    }

    .neighbor-media{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background-size:cover;
      background-position:center;
    }

    .neighbor-shade{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.34)),
        linear-gradient(0deg, rgba(0,0,0,.26), rgba(0,0,0,.26));
    }

    .close-btn{
      position:fixed;
      top:24px;
      right:24px;
      z-index:140;
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.34);
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
      cursor:none;
    }

    .close-btn.show{
      display:flex;
    }

    @media (max-width: 1024px){
      .navbar{ padding:1.5rem 2rem; }
      .nav-shab{ font-size:2.2rem; }
      .nav-visuals{ font-size:1rem; }
    }

    @media (max-width: 768px){
      :root{
        --card-w:78px;
        --card-h:140px;
        --gap:10px;
      }

      body{
        cursor:auto;
      }

      .cursor,
      .cursor-follower,
      .close-btn{
        display:none;
      }

      .navbar{
        padding:1rem 1.5rem;
      }

      .nav-shab{ font-size:1.9rem; }
      .nav-right{ display:none; }

      .works-track{
        padding-left:22vw;
        padding-right:58vw;
      }

      .project-card{
        width:92vw;
        height:68vh;
        top:47%;
        border-radius:12px;
      }

      .project-title{
        bottom:92px;
        width:88vw;
      }

      .project-copy{
        width:88vw;
        bottom:28px;
      }

      .neighbor-card{
        width:38vw;
        height:34vh;
      }

      .neighbor-left{
        left:13%;
      }

      .neighbor-right{
        left:87%;
      }
    }

    @media (max-width: 480px){
      .nav-shab{ font-size:1.6rem; }
      .nav-visuals{ font-size:.9rem; letter-spacing:.3em; }
    }
  </style>
</head>

<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <header class="navbar">
    <a href="#top" class="navbar-logo" aria-label="Shab Visuals — Home">
      <div class="nav-shab-wrap" id="navShabWrap">
        <span class="nav-shab" id="navShab">shab</span>
        <div class="nav-line" id="navLineSh"></div>
        <div class="nav-line" id="navLineAb"></div>
      </div>
      <span class="nav-visuals">visuals</span>
    </a>

    <div class="nav-right">
      <div class="nav-item-wrap">
        <span class="nav-bullet"></span>
        <a class="nav-item" href="works.html">works</a>
      </div>

      <div class="nav-item-wrap nav-services-wrap">
        <span class="nav-bullet"></span>
        <span class="nav-item">services</span>

        <div class="services-dropdown">
          <div class="dropdown-inner">
            <a class="dropdown-item" href="#saas">
              <span class="dropdown-dot"></span>
              <span class="dropdown-label">SaaS & Product Videos</span>
            </a>
            <div class="dropdown-divider"></div>

            <a class="dropdown-item" href="#commercial">
              <span class="dropdown-dot"></span>
              <span class="dropdown-label">Commercial & Promo Ads</span>
            </a>
            <div class="dropdown-divider"></div>

            <a class="dropdown-item" href="#social">
              <span class="dropdown-dot"></span>
              <span class="dropdown-label">Social Media Content</span>
            </a>
            <div class="dropdown-divider"></div>

            <a class="dropdown-item" href="#motion">
              <span class="dropdown-dot"></span>
              <span class="dropdown-label">Motion Graphics & Animation</span>
            </a>
          </div>
        </div>
      </div>

      <div class="nav-item-wrap">
        <span class="nav-bullet"></span>
        <a class="nav-item" href="#about">about</a>
      </div>

      <div class="nav-cta-wrap">
        <span class="nav-cta-bullet"></span>
        <a class="nav-cta" href="#contact">get in touch</a>
      </div>
    </div>
  </header>

  <main class="stage rail-guides" id="top">
    <div class="track-viewport">
      <div class="works-track" id="worksTrack"></div>
    </div>
  </main>

  <div class="project-overlay" id="projectOverlay">
    <div class="neighbors">
      <div class="neighbor-card neighbor-left" id="neighborLeft">
        <div class="neighbor-media" id="neighborLeftMedia"></div>
        <div class="neighbor-shade"></div>
      </div>

      <div class="neighbor-card neighbor-right" id="neighborRight">
        <div class="neighbor-media" id="neighborRightMedia"></div>
        <div class="neighbor-shade"></div>

    function calcLines(shabEl, wrapEl, lineSh, lineAb, text) {
      const fs = parseFloat(getComputedStyle(shabEl).fontSize);
      const ff = getComputedStyle(shabEl).fontFamily;
      const wrapW = wrapEl.offsetWidth;
      const wrapH = wrapEl.offsetHeight;
      if (wrapW === 0) return;

      const cvs = document.createElement('canvas');
      const ctx = cvs.getContext('2d');
      ctx.font = `600 ${fs}px ${ff}`;

      const mAll = ctx.measureText('shab');
      const mSh = ctx.measureText('sh');
      const mS = ctx.measureText('s');
      const mSha = ctx.measureText('sha');
      const mA = ctx.measureText('a');

      const ratio = wrapW / mAll.width;
      const shLeft = (mS.width * 0.25) * ratio;
      const shWidth = (mSh.width * 1.05 - mS.width * 0.25) * ratio;
      const abLeft = (mSha.width - mA.width * 0.5) * ratio;
      const abWidth = wrapW - abLeft;

      const ascent = mAll.actualBoundingBoxAscent || fs * 0.75;
      const descent = mAll.actualBoundingBoxDescent || fs * 0.18;
      const topPad = (wrapH - ascent - descent) / 2;

      const isNav = lineSh.classList.contains('nav-line');
      const shBottomOffset = isNav ? (descent + topPad - 8) : (descent + topPad - 15);
      const abTopOffset = isNav ? Math.max(0, topPad - 4) : Math.max(0, topPad - 1);

      lineSh.style.left = shLeft + 'px';
      lineSh.style.width = shWidth + 'px';
      lineSh.style.bottom = shBottomOffset + 'px';
      lineSh.style.top = 'auto';

      lineAb.style.left = abLeft + 'px';
      lineAb.style.width = abWidth + 'px';
      lineAb.style.top = abTopOffset + 'px';
      lineAb.style.bottom = 'auto';

      const typed = text || '';
      lineSh.style.opacity = typed.length >= 2 ? '1' : '0';
      lineAb.style.opacity = typed.length >= 4 ? '1' : '0';
    }
