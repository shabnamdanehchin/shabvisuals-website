<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works - Horizontal Bump Gallery</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --text: #f4f4f4;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden; /* جلوگیری از اسکرول پیش‌فرض مرورگر */
      cursor: none;
      height: 100vh;
    }

    /* --- Cursor --- */
    .cursor {
      position: fixed;
      left: 0; top: 0;
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }
    .cursor-follower {
      position: fixed;
      left: 0; top: 0;
      width: 24px; height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s var(--ease), height 0.3s var(--ease);
      mix-blend-mode: difference;
    }

    /* --- Navigation --- */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 40px;
    }
    .nav-logo img { height: 32px; filter: invert(1); }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a {
      color: #fff; text-decoration: none; font-size: 0.7rem;
      letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5;
    }
    .nav-links a.active { opacity: 1; }

    /* --- Stage & Track --- */
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .track-container {
      position: relative;
      width: 100%;
      height: clamp(300px, 55vh, 600px);
      overflow: visible;
      /* شروع از وسط صفحه */
      padding-left: 50vw; 
    }

    .works-track {
      display: flex;
      gap: 15px;
      height: 100%;
      will-change: transform;
    }

    .work-item {
      position: relative;
      flex: 0 0 110px; /* کارت‌های باریک */
      height: 100%;
      background: #111;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transform-origin: center bottom;
      transition: 
        filter 0.5s ease, 
        opacity 0.5s ease,
        box-shadow 0.5s ease;
      will-change: transform;
    }

    /* استایل کارت فعال (وقتی کلیک می‌شود) */
    .work-item.active {
      z-index: 100;
      box-shadow: 0 50px 100px rgba(0,0,0,0.9);
      border-color: rgba(255,255,255,0.4);
    }

    .work-thumb {
      position: absolute;
      inset: 0;
      background: var(--thumb);
      background-size: cover;
      background-position: center;
      filter: grayscale(1) brightness(0.6);
      transition: filter 0.6s var(--ease);
    }
    .work-item:hover .work-thumb,
    .work-item.active .work-thumb {
      filter: grayscale(0) brightness(1);
    }

    .work-video {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .work-item.video-playing .work-video { opacity: 1; }

    /* --- Content Below --- */
    .content-area {
      position: absolute;
      bottom: 8vh;
      left: 0; width: 100%;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.7s var(--ease);
    }
    .content-area.show { opacity: 1; transform: translateY(0); }
    
    .project-title {
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }
    .project-desc {
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
    }

    .close-btn {
      position: fixed;
      right: 40px; bottom: 40px;
      width: 50px; height: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 1.2rem;
      display: none;
      z-index: 1000;
      cursor: none;
    }
    .close-btn.show { display: flex; align-items: center; justify-content: center; }

  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <nav>
    <div class="nav-logo"> <img src="logo.png" alt="Logo"> </div>
    <ul class="nav-links">
      <li><a href="#" class="active">Works</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="stage">
    <div class="track-container">
      <div class="works-track" id="worksTrack">
        <!-- کارت‌ها توسط JS ساخته می‌شوند -->
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <h1 class="project-title" id="pTitle">Project Name</h1>
      <p class="project-desc" id="pDesc">Description goes here...</p>
    </div>
  </div>

  <button class="close-btn" id="closeBtn">✕</button>

  <script>
    const projects = Array.from({ length: 13 }).map((_, i) => ({
      id: i,
      title: `Project ${i + 1}`,
      desc: "This project explores cinematic motion and interactive storytelling through a unique horizontal experience.",
      thumb: `linear-gradient(${45 + i * 20}deg, #222, #444)`,
      video: "" // آدرس ویدیوها را اینجا قرار دهید
    }));

    const track = document.getElementById('worksTrack');
    const contentArea = document.getElementById('contentArea');
    const closeBtn = document.getElementById('closeBtn');

    let scrollPos = 0;
    let targetScrollPos = 0;
    let isProjectOpen = false;

    // ایجاد کارت‌ها
    projects.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'work-item';
      div.dataset.index = i;
      div.style.setProperty('--thumb', p.thumb);
      div.innerHTML = `
        <div class="work-thumb"></div>
        <video class="work-video" muted playsinline loop></video>
      `;
      div.addEventListener('click', () => openProject(i));
      track.appendChild(div);
    });

    const items = document.querySelectorAll('.work-item');

    // اسکرول ماوس
    window.addEventListener('wheel', (e) => {
      if (isProjectOpen) return;
      targetScrollPos += e.deltaY * 0.8;
      // محدود کردن اسکرول
      const maxScroll = track.scrollWidth - (window.innerWidth / 2);
      targetScrollPos = Math.max(0, Math.min(maxScroll, targetScrollPos));
    }, { passive: true });

    function openProject(index) {
      if (isProjectOpen) return;
      isProjectOpen = true;
      
      const item = items[index];
      item.classList.add('active');
      
      // تاریک کردن بقیه
      items.forEach((it, i) => {
        if (i !== index) it.style.opacity = '0.2';
      });

      // نمایش متن
      document.getElementById('pTitle').innerText = projects[index].title;
      document.getElementById('pDesc').innerText = projects[index].desc;
      contentArea.classList.add('show');
      closeBtn.classList.add('show');
    }

    closeBtn.addEventListener('click', () => {
      isProjectOpen = false;
      items.forEach(it => {
        it.classList.remove('active');
        it.style.opacity = '1';
      });
      contentArea.classList.remove('show');
      closeBtn.classList.remove('show');
    });

    // انیمیشن اصلی
    function update() {
      // نرم کردن حرکت اسکرول
      scrollPos += (targetScrollPos - scrollPos) * 0.08;
      
      if (!isProjectOpen) {
        track.style.transform = `translateX(${-scrollPos}px)`;
      }

      items.forEach((item, i) => {
        const rect = item.getBoundingClientRect();
        const itemCenter = rect.left + rect.width / 2;
        const viewportCenter = window.innerWidth / 2;
        
        // محاسبه فاصله از مرکز برای افکت دست‌انداز
        const distanceFromCenter = itemCenter - viewportCenter;
        const normalizedDist = Math.abs(distanceFromCenter) / (window.innerWidth / 2);
        
        if (!isProjectOpen) {
          // افکت دست‌انداز (Bump): وقتی به مرکز نزدیک می‌شود بالا می‌رود
          // استفاده از یک تابع زنگوله‌ای (Gaussian-like)
          const bump = Math.pow(Math.max(0, 1 - normalizedDist), 3);
          const translateY = bump * -120; // میزان پرش به بالا
          const rotate = (distanceFromCenter * 0.05) * bump; // کج شدن
          const scale = 1 + (bump * 0.8); // بزرگ شدن در مرکز

          item.style.transform = `translateY(${translateY}px) rotate(${rotate}deg) scale(${scale})`;
          
          // محو شدن کارت‌های دورتر
          item.style.filter = `grayscale(${1 - bump}) brightness(${0.5 + bump * 0.5})`;
        } else {
          // اگر پروژه باز است، فقط کارت فعال بزرگ بماند
          if (item.classList.contains('active')) {
            item.style.transform = `scale(3.5) translateY(-20px)`;
          }
        }
      });

      requestAnimationFrame(update);
    }

    // کدهای مربوط به موس
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursorFollower');
    let mx = 0, my = 0, fx = 0, fy = 0;

    window.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });

    function updateCursor() {
      fx += (mx - fx) * 0.1;
      fy += (my - fy) * 0.1;
      follower.style.left = fx + 'px';
      follower.style.top = fy + 'px';
      requestAnimationFrame(updateCursor);
    }

    update();
    updateCursor();

  </script>
</body>
</html>
