<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works - Shab Visuals</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --text: #f4f4f4;
      --muted: rgba(255, 255, 255, 0.5);
      --line: rgba(255, 255, 255, 0.14);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    a,
    button,
    .work-item {
      cursor: none;
    }

    body {
      min-height: 100vh;
    }

    .cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 9px;
      height: 9px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease;
      mix-blend-mode: difference;
    }

    .cursor-follower {
      position: fixed;
      left: 0;
      top: 0;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition:
        width 0.3s ease,
        height 0.3s ease,
        border-color 0.3s ease;
      mix-blend-mode: difference;
    }

    .cursor.hover {
      width: 15px;
      height: 15px;
    }

    .cursor-follower.hover {
      width: 62px;
      height: 62px;
      border-color: #fff;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 42px;
      mix-blend-mode: difference;
    }

    .nav-logo img {
      height: 36px;
      width: auto;
      display: block;
      filter: brightness(0) invert(1);
    }

    .nav-links {
      display: flex;
      gap: 34px;
      list-style: none;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.62;
      transition: opacity 0.25s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      opacity: 1;
    }

    main {
      min-height: 100vh;
    }

    .film-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 112px 22px 36px;
    }

    .film-stage {
      width: 100%;
      max-width: 1500px;
      position: relative;
    }

    .small-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-inline: 2px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.9s var(--ease) 0.1s forwards;
    }

    .small-header span {
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .film-reel {
      position: relative;
      height: clamp(150px, 22vh, 235px);
      min-height: 150px;
      overflow: visible;
      padding: 24px 0;
      background: #030303;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 24px 90px rgba(0, 0, 0, 0.72),
        inset 0 0 35px rgba(255, 255, 255, 0.035);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1s var(--ease) 0.22s forwards;
    }

    .film-reel::before,
    .film-reel::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 18px;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.58) 0 4px, transparent 4.8px) 0 50% / 28px 14px repeat-x,
        linear-gradient(to right, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.1));
      opacity: 0.72;
    }

    .film-reel::before {
      top: 3px;
    }

    .film-reel::after {
      bottom: 3px;
    }

    .works-track-outer {
      width: 100%;
      height: 100%;
      overflow: visible;
      position: relative;
    }

    .works-track {
      position: relative;
      display: grid;
      grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 5px;
      width: 100%;
      height: 100%;
      overflow: visible;
      padding: 0 5px;
      isolation: isolate;
    }

    .work-item {
      --wave-y: 0px;
      --tilt: 0deg;
      --active-scale: 1;
      position: relative;
      min-width: 0;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 4px;
      background: #101010;
      transform:
        translateY(var(--wave-y))
        rotateZ(var(--tilt))
        scale(var(--active-scale));
      transform-origin: center center;
      will-change: transform, filter, opacity;
      transition:
        transform 0.85s var(--ease),
        opacity 0.55s ease,
        filter 0.55s ease,
        border-color 0.35s ease,
        box-shadow 0.55s ease;
    }

    .work-item::before,
    .work-item::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 10px;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(circle, rgba(0, 0, 0, 0.95) 0 2.8px, transparent 3.3px) 4px 50% / 18px 8px repeat-x;
      opacity: 0.68;
    }

    .work-item::before {
      top: 4px;
    }

    .work-item::after {
      bottom: 4px;
    }

    .work-item.is-dim {
      opacity: 0.22;
      filter: grayscale(1) brightness(0.58);
    }

    .work-item.is-neighbor {
      opacity: 0.72;
      filter: grayscale(0.75) brightness(0.82);
      z-index: 6;
      --active-scale: 1.14;
    }

    .work-item.active {
      z-index: 20;
      opacity: 1;
      filter: none;
      border-color: rgba(255, 255, 255, 0.55);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.82),
        0 0 0 1px rgba(255, 255, 255, 0.18);
      --active-scale: 2.32;
    }

    .work-thumb,
    .work-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .work-thumb {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0)),
        var(--thumb);
      background-size: cover;
      background-position: center;
      filter: grayscale(1) contrast(1.12) brightness(0.78);
      transform: scale(1.08);
      transition:
        opacity 0.5s ease,
        filter 0.85s ease,
        transform 1.2s var(--ease);
    }

    .work-item:hover .work-thumb,
    .work-item.active .work-thumb {
      filter: grayscale(0) contrast(1.04) brightness(1) saturate(1.15);
      transform: scale(1.16);
    }

    .work-item.video-playing .work-thumb {
      opacity: 0;
    }

    .work-video {
      display: block;
      object-fit: cover;
      background: #080808;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    .work-item.video-playing .work-video {
      opacity: 1;
      pointer-events: auto;
    }

    .work-shade {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(to top, rgba(0, 0, 0, 0.82), transparent 60%),
        linear-gradient(to right, rgba(0, 0, 0, 0.26), transparent 42%, rgba(0, 0, 0, 0.2));
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    .work-item.active .work-shade {
      opacity: 0.42;
    }

    .work-info {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px 8px;
      color: #fff;
      pointer-events: none;
    }

    .work-number {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.62);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      transition: all 0.45s var(--ease);
    }

    .work-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .work-title {
      max-height: 145px;
      font-size: clamp(0.68rem, 0.85vw, 0.95rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 650;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      transition: all 0.55s var(--ease);
    }

    .work-tag {
      max-height: 120px;
      color: rgba(255, 255, 255, 0.48);
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      transition: all 0.55s var(--ease);
    }

    .work-item.active .work-info {
      padding: 12px;
    }

    .work-item.active .work-number,
    .work-item.active .work-title,
    .work-item.active .work-tag {
      writing-mode: initial;
      transform: none;
      max-height: none;
    }

    .work-item.active .work-title {
      font-size: clamp(0.86rem, 1.05vw, 1.08rem);
    }

    .work-item.active .work-tag {
      font-size: 0.48rem;
    }

    .project-copy {
      max-width: 980px;
      min-height: 114px;
      margin: 56px auto 0;
      text-align: center;
      opacity: 0;
      transform: translateY(22px);
      pointer-events: none;
      transition:
        opacity 0.55s ease,
        transform 0.75s var(--ease),
        margin-top 0.75s var(--ease);
    }

    .project-copy.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .copy-kicker {
      margin-bottom: 12px;
      color: rgba(255, 255, 255, 0.46);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .copy-title {
      margin-bottom: 16px;
      font-size: clamp(2rem, 5vw, 5.4rem);
      line-height: 0.88;
      letter-spacing: -0.065em;
      font-weight: 720;
    }

    .copy-desc {
      max-width: 800px;
      margin: 0 auto;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(0.95rem, 1.25vw, 1.15rem);
      line-height: 1.7;
    }

    .copy-desc .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(18px) rotate(2deg);
      transition:
        opacity 0.55s ease,
        transform 0.75s var(--ease);
      transition-delay: calc(var(--i) * 22ms);
    }

    .project-copy.open .copy-desc .word {
      opacity: 1;
      transform: translateY(0) rotate(0deg);
    }

    .close-active {
      position: fixed;
      right: 34px;
      bottom: 30px;
      z-index: 200;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 1.35rem;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition:
        opacity 0.3s ease,
        transform 0.45s var(--ease),
        border-color 0.25s ease,
        background 0.25s ease;
    }

    .close-active.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .close-active:hover {
      border-color: rgba(255, 255, 255, 0.58);
      background: rgba(255, 255, 255, 0.12);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .film-page {
        justify-content: flex-start;
        overflow-x: auto;
      }

      .film-stage {
        min-width: 1120px;
      }

      .project-copy {
        max-width: 720px;
      }
    }

    @media (max-width: 760px) {
      html,
      body {
        cursor: auto;
      }

      a,
      button,
      .work-item {
        cursor: pointer;
      }

      .cursor,
      .cursor-follower {
        display: none;
      }

      nav {
        padding: 20px 18px;
      }

      .nav-logo img {
        height: 30px;
      }

      .nav-links {
        gap: 16px;
      }

      .nav-links a {
        font-size: 0.62rem;
        letter-spacing: 0.1em;
      }

      .film-page {
        padding: 96px 14px 26px;
      }

      .film-stage {
        min-width: 980px;
      }

      .film-reel {
        height: 170px;
      }

      .work-item.active {
        --active-scale: 2.12;
      }

      .project-copy {
        width: calc(100vw - 36px);
        margin-left: auto;
        margin-right: auto;
      }

      .close-active {
        right: 18px;
        bottom: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <nav>
    <a href="index.html" class="nav-logo" aria-label="Shab Visuals">
      <img src="logo.png" alt="Shab Visuals" />
    </a>

    <ul class="nav-links">
      <li><a href="index.html" class="active">Works</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section class="film-page" aria-label="Works">
      <div class="film-stage">
        <div class="small-header">
          <span>Shab Visuals</span>
          <span>13 Projects</span>
        </div>

        <div class="film-reel">
          <div class="works-track-outer">
            <div class="works-track" id="worksTrack"></div>
          </div>
        </div>

        <section class="project-copy" id="projectCopy" aria-live="polite">
          <p class="copy-kicker" id="copyKicker">01 / 13 - Motion Design</p>
          <h1 class="copy-title" id="copyTitle">Project One</h1>
          <p class="copy-desc" id="copyDesc"></p>
        </section>
      </div>
    </section>
  </main>

  <button class="close-active" id="closeActive" aria-label="Close project">x</button>

  <script>
    const projects = [
      {
        num: "01",
        title: "Project One",
        tag: "Motion Design",
        year: "2024",
        video: "videos/project-01.mp4",
        thumb: "linear-gradient(135deg, #ff6a00, #ee0979)",
        desc: "A short description of this project. Replace this text with the real project story, process, client details, or production notes."
      },
      {
        num: "02",
        title: "Project Two",
        tag: "Visual Identity",
        year: "2024",
        video: "videos/project-02.mp4",
        thumb: "linear-gradient(135deg, #00c6ff, #0072ff)",
        desc: "A clean visual identity project with motion-driven presentation and a cinematic look."
      },
      {
        num: "03",
        title: "Project Three",
        tag: "Video Production",
        year: "2024",
        video: "videos/project-03.mp4",
        thumb: "linear-gradient(135deg, #f7971e, #ffd200)",
        desc: "A video production project focused on rhythm, atmosphere, editing, and visual storytelling."
      },
      {
        num: "04",
        title: "Project Four",
        tag: "Motion Design",
        year: "2024",
        video: "videos/project-04.mp4",
        thumb: "linear-gradient(135deg, #654ea3, #eaafc8)",
        desc: "Motion graphics, animated transitions, and a bold visual language for a modern campaign."
      },
      {
        num: "05",
        title: "Project Five",
        tag: "Brand Film",
        year: "2024",
        video: "videos/project-05.mp4",
        thumb: "linear-gradient(135deg, #11998e, #38ef7d)",
        desc: "A brand film with a minimal, emotional, and premium visual direction."
      },
      {
        num: "06",
        title: "Project Six",
        tag: "Visual Identity",
        year: "2024",
        video: "videos/project-06.mp4",
        thumb: "linear-gradient(135deg, #fc466b, #3f5efb)",
        desc: "A complete identity system designed for digital-first brand communication."
      },
      {
        num: "07",
        title: "Project Seven",
        tag: "Motion Design",
        year: "2024",
        video: "videos/project-07.mp4",
        thumb: "linear-gradient(135deg, #c31432, #240b36)",
        desc: "A fast-paced motion piece with abstract forms, typography, and sound-based timing."
      },
      {
        num: "08",
        title: "Project Eight",
        tag: "Video Production",
        year: "2024",
        video: "videos/project-08.mp4",
        thumb: "linear-gradient(135deg, #36d1dc, #5b86e5)",
        desc: "A production piece built around cinematic framing, light, and precise editing."
      },
      {
        num: "09",
        title: "Project Nine",
        tag: "Brand Film",
        year: "2024",
        video: "videos/project-09.mp4",
        thumb: "linear-gradient(135deg, #ff512f, #dd2476)",
        desc: "A brand film made to introduce the mood, personality, and values of the project."
      },
      {
        num: "10",
        title: "Project Ten",
        tag: "Motion Design",
        year: "2024",
        video: "videos/project-10.mp4",
        thumb: "linear-gradient(135deg, #1d976c, #93f9b9)",
        desc: "A motion design project with a strong graphic structure and energetic animation."
      },
      {
        num: "11",
        title: "Project Eleven",
        tag: "Visual Identity",
        year: "2024",
        video: "videos/project-11.mp4",
        thumb: "linear-gradient(135deg, #834d9b, #d04ed6)",
        desc: "A visual identity concept with flexible layouts, sharp contrast, and premium details."
      },
      {
        num: "12",
        title: "Project Twelve",
        tag: "Video Production",
        year: "2024",
        video: "videos/project-12.mp4",
        thumb: "linear-gradient(135deg, #4b6cb7, #182848)",
        desc: "A video production piece focused on atmosphere, visual pacing, and polished delivery."
      },
      {
        num: "13",
        title: "Project Thirteen",
        tag: "Brand Film",
        year: "2024",
        video: "videos/project-13.mp4",
        thumb: "linear-gradient(135deg, #f953c6, #b91d73)",
        desc: "A final brand film project with a strong cinematic tone and memorable visual moments."
      }
    ];

    const cursor = document.getElementById("cursor");
    const follower = document.getElementById("cursorFollower");
    const track = document.getElementById("worksTrack");
    const projectCopy = document.getElementById("projectCopy");
    const copyKicker = document.getElementById("copyKicker");
    const copyTitle = document.getElementById("copyTitle");
    const copyDesc = document.getElementById("copyDesc");
    const closeActive = document.getElementById("closeActive");

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let followerX = mouseX;
    let followerY = mouseY;
    let targetWave = 0;
    let currentWave = 0;
    let pointerX = window.innerWidth / 2;
    let lastWheelTime = 0;
    let activeIndex = null;

    function renderProjects() {
      track.innerHTML = projects.map((project, index) => `
        <article class="work-item" data-index="${index}" style="--thumb: ${project.thumb};">
          <div class="work-thumb"></div>
          <video class="work-video" muted playsinline controls preload="metadata"></video>
          <div class="work-shade"></div>
          <div class="work-info">
            <span class="work-number">${project.num}</span>
            <div class="work-meta">
              <h2 class="work-title">${project.title}</h2>
              <span class="work-tag">${project.tag}</span>
            </div>
          </div>
        </article>
      `).join("");
    }

    function typographyText(text) {
      return text
        .split(" ")
        .map((word, index) => `<span class="word" style="--i:${index}">${word}&nbsp;</span>`)
        .join("");
    }

    function stopAllVideos() {
      document.querySelectorAll(".work-video").forEach((video) => {
        video.pause();
        video.removeAttribute("src");
        video.load();
      });
    }

    function setProjectCopy(project) {
      projectCopy.classList.remove("open");

      window.setTimeout(() => {
        copyKicker.textContent = `${project.num} / 13 - ${project.tag} / ${project.year}`;
        copyTitle.textContent = project.title;
        copyDesc.innerHTML = typographyText(project.desc);
        projectCopy.classList.add("open");
      }, 140);
    }

    function openProject(index) {
      const items = document.querySelectorAll(".work-item");
      const project = projects[index];

      activeIndex = index;
      stopAllVideos();

      items.forEach((item, itemIndex) => {
        item.classList.remove("active", "is-neighbor", "is-dim", "video-playing");

        if (itemIndex === index) {
          item.classList.add("active");
        } else if (Math.abs(itemIndex - index) === 1) {
          item.classList.add("is-neighbor");
        } else {
          item.classList.add("is-dim");
        }
      });

      const activeItem = items[index];
      const video = activeItem.querySelector(".work-video");

      video.src = project.video;
      video.load();

      window.setTimeout(() => {
        activeItem.classList.add("video-playing");
        video.play().catch(() => {});
      }, 420);

      setProjectCopy(project);
      closeActive.classList.add("show");
    }

    function closeProject() {
      const items = document.querySelectorAll(".work-item");

      activeIndex = null;
      stopAllVideos();

      items.forEach((item) => {
        item.classList.remove("active", "is-neighbor", "is-dim", "video-playing");
      });

      projectCopy.classList.remove("open");
      closeActive.classList.remove("show");
    }

    function bindInteractions() {
      document.querySelectorAll("a, button, .work-item").forEach((element) => {
        element.addEventListener("mouseenter", () => {
          cursor.classList.add("hover");
          follower.classList.add("hover");
        });

        element.addEventListener("mouseleave", () => {
          cursor.classList.remove("hover");
          follower.classList.remove("hover");
        });
      });

      document.querySelectorAll(".work-item").forEach((item) => {
        item.addEventListener("click", () => {
          openProject(Number(item.dataset.index));
        });
      });
    }

    document.addEventListener("mousemove", (event) => {
      mouseX = event.clientX;
      mouseY = event.clientY;
      pointerX = event.clientX;

      cursor.style.left = mouseX + "px";
      cursor.style.top = mouseY + "px";
    });

    function animateCursor() {
      followerX += (mouseX - followerX) * 0.13;
      followerY += (mouseY - followerY) * 0.13;

      follower.style.left = followerX + "px";
      follower.style.top = followerY + "px";

      requestAnimationFrame(animateCursor);
    }

    window.addEventListener(
      "wheel",
      (event) => {
        targetWave += event.deltaY * 0.045;
        targetWave = Math.max(-22, Math.min(22, targetWave));
        lastWheelTime = performance.now();
      },
      { passive: true }
    );

    function animateFilmWave() {
      const now = performance.now();
      const items = document.querySelectorAll(".work-item");
      const wheelActive = now - lastWheelTime < 900;

      targetWave *= 0.92;
      currentWave += (targetWave - currentWave) * 0.09;

      items.forEach((item, index) => {
        const rect = item.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const distance = (center - pointerX) / window.innerWidth;

        const idleWave = Math.sin(now * 0.0014 + index * 0.64) * 2.4;
        const scrollWave = Math.sin(index * 0.92 + currentWave * 0.18) * Math.abs(currentWave) * 0.85;
        const pointerWave = Math.sin(distance * Math.PI * 2) * 4;
        const lift = wheelActive ? scrollWave + pointerWave : idleWave;
        const tilt = wheelActive ? Math.sin(index + currentWave * 0.08) * 1.6 : Math.sin(now * 0.001 + index) * 0.35;

        item.style.setProperty("--wave-y", `${-lift}px`);
        item.style.setProperty("--tilt", `${tilt}deg`);
      });

      requestAnimationFrame(animateFilmWave);
    }

    closeActive.addEventListener("click", closeProject);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeProject();
      }
    });

    renderProjects();
    bindInteractions();
    animateCursor();
    animateFilmWave();
  </script>
</body>
</html>
