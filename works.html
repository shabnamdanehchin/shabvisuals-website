<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works</title>
  <style>
    :root{
      --bg:#050505;
      --text:#f4f4f4;
      --muted:rgba(255,255,255,.55);
      --line:rgba(255,255,255,.12);
      --ease:cubic-bezier(.16,1,.3,1);
      --card-w:clamp(88px, 6.6vw, 126px);
      --card-h:clamp(145px, 20vw, 250px);
      --gap:14px;
    }

    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Helvetica, Arial, sans-serif;
      overflow:hidden;
      cursor:none;
    }

    .cursor,.cursor-follower{
      position:fixed;
      top:0;left:0;
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:9999;
      mix-blend-mode:difference;
    }
    .cursor{
      width:6px;height:6px;border-radius:50%;
      background:#fff;
    }
    .cursor-follower{
      width:22px;height:22px;border-radius:50%;
      border:1px solid rgba(255,255,255,.4);
      transition:width .25s var(--ease), height .25s var(--ease), border-color .25s var(--ease);
    }
    body.is-hovering .cursor-follower{
      width:30px;height:30px;
      border-color:rgba(255,255,255,.7);
    }

    .stage{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .track-viewport{
      position:relative;
      width:min(100vw, 1400px);
      height:var(--card-h);
      overflow:visible;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .works-track{
      position:relative;
      height:var(--card-h);
      display:flex;
      align-items:center;
      gap:var(--gap);
      will-change:transform;
      transform:translateX(0);
      padding:0 calc(50vw - (var(--card-w) / 2));
    }

    .work-item{
      position:relative;
      flex:0 0 var(--card-w);
      width:var(--card-w);
      height:var(--card-h);
      border-radius:10px;
      overflow:hidden;
      background:#111;
      border:1px solid rgba(255,255,255,.08);
      transform-origin:center center;
      will-change:transform, opacity, filter;
      transition:filter .45s var(--ease), border-color .45s var(--ease), box-shadow .45s var(--ease), opacity .45s var(--ease);
      cursor:none;
    }

    .work-item::before{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), transparent 35%, rgba(0,0,0,.35));
      z-index:2;
      pointer-events:none;
      opacity:.55;
      transition:opacity .45s var(--ease);
    }

    .work-thumb,.work-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .work-thumb{
      filter:grayscale(1) brightness(.6) saturate(.8);
      transform:scale(1.03);
      transition:filter .5s var(--ease), transform .5s var(--ease);
    }

    .work-video{
      opacity:0;
      transition:opacity .45s var(--ease);
    }

    .work-item:hover .work-thumb,
    .work-item.is-hovered .work-thumb,
    .work-item.active .work-thumb{
      filter:grayscale(0) brightness(1) saturate(1.25);
      transform:scale(1.08);
    }

    .work-item:hover::before,
    .work-item.is-hovered::before,
    .work-item.active::before{
      opacity:.2;
    }

    .work-item.active{
      z-index:50;
      border-color:rgba(255,255,255,.35);
      box-shadow:0 40px 90px rgba(0,0,0,.6);
    }

    .work-item.video-playing .work-video{opacity:1}
    .work-item.video-playing .work-thumb{opacity:0}

    .work-title{
      position:absolute;
      left:0;right:0;bottom:10px;
      z-index:3;
      padding:0 10px;
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#fff;
      text-align:center;
      opacity:.9;
      text-shadow:0 2px 10px rgba(0,0,0,.5);
      pointer-events:none;
    }

    .content-area{
      position:fixed;
      left:50%;
      bottom:7vh;
      transform:translateX(-50%) translateY(18px);
      text-align:center;
      width:min(82vw, 720px);
      opacity:0;
      pointer-events:none;
      transition:opacity .5s var(--ease), transform .5s var(--ease);
    }
    .content-area.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .project-title{
      margin:0 0 10px;
      font-size:clamp(28px, 5vw, 64px);
      line-height:1;
      letter-spacing:-.04em;
      font-weight:800;
    }
    .project-desc{
      margin:0;
      font-size:clamp(13px, 1.35vw, 17px);
      line-height:1.7;
      color:var(--muted);
    }

    .close-btn{
      position:fixed;
      right:24px;
      top:24px;
      z-index:100;
      width:44px;height:44px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.35);
      color:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      cursor:none;
      backdrop-filter:blur(10px);
    }
    .close-btn.show{display:flex}

    @media (max-width: 768px){
      :root{
        --card-w:88px;
        --card-h:160px;
        --gap:10px;
      }
      body{cursor:auto}
      .cursor,.cursor-follower,.close-btn{cursor:auto}
      .works-track{padding:0 calc(50vw - (var(--card-w) / 2))}
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <div class="stage">
    <div class="track-viewport">
      <div class="works-track" id="worksTrack"></div>
    </div>
  </div>

  <div class="content-area" id="contentArea">
    <h1 class="project-title" id="projectTitle">Project</h1>
    <p class="project-desc" id="projectDesc"></p>
  </div>

  <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>

  <script>
    const projects = [
      { title: "Project One", desc: "A compact cinematic study with an interactive horizontal rhythm.", thumb: "linear-gradient(160deg, #2f2f2f, #707070)" },
      { title: "Project Two", desc: "A visual narrative balancing motion, texture, and depth.", thumb: "linear-gradient(160deg, #272f3f, #6c86b6)" },
      { title: "Project Three", desc: "An editorial layout experiment with hover-driven color reveal.", thumb: "linear-gradient(160deg, #3a2222, #9f5050)" },
      { title: "Project Four", desc: "A motion-led interface built around small centered cards.", thumb: "linear-gradient(160deg, #2b3b2f, #68a06f)" },
      { title: "Project Five", desc: "A minimal showcase with layered focus on the active item.", thumb: "linear-gradient(160deg, #29223b, #7f6cc9)" },
      { title: "Project Six", desc: "A smooth horizontal reel inspired by editorial portfolio systems.", thumb: "linear-gradient(160deg, #3d2f1d, #c38b49)" },
      { title: "Project Seven", desc: "A tactile browsing experience with soft bump-based scroll response.", thumb: "linear-gradient(160deg, #20242f, #67738f)" },
      { title: "Project Eight", desc: "A compact gallery focused on depth, hover color, and active focus.", thumb: "linear-gradient(160deg, #2a1f27, #8e5078)" },
      { title: "Project Nine", desc: "A quiet interface with strong center alignment and layered cards.", thumb: "linear-gradient(160deg, #1f2f33, #5da0aa)" },
      { title: "Project Ten", desc: "A soft-motion layout that keeps the active work in front.", thumb: "linear-gradient(160deg, #362c1d, #9a7a4a)" }
    ];

    const track = document.getElementById('worksTrack');
    const contentArea = document.getElementById('contentArea');
    const projectTitle = document.getElementById('projectTitle');
    const projectDesc = document.getElementById('projectDesc');
    const closeBtn = document.getElementById('closeBtn');
    const cursor = document.getElementById('cursor');
    const cursorFollower = document.getElementById('cursorFollower');

    let scrollTarget = 0;
    let scrollCurrent = 0;
    let activeIndex = -1;
    let openIndex = -1;
    let mx = innerWidth / 2;
    let my = innerHeight / 2;
    let fx = mx;
    let fy = my;

    projects.forEach((project, index) => {
      const item = document.createElement('div');
      item.className = 'work-item';
      item.dataset.index = index;
      item.innerHTML = `
        <div class="work-thumb" style="background:${project.thumb}"></div>
        <video class="work-video" muted playsinline loop></video>
        <div class="work-title">${project.title}</div>
      `;
      item.addEventListener('mouseenter', () => document.body.classList.add('is-hovering'));
      item.addEventListener('mouseleave', () => document.body.classList.remove('is-hovering'));
      item.addEventListener('click', () => openProject(index));
      track.appendChild(item);
    });

    const items = [...document.querySelectorAll('.work-item')];

    function openProject(index){
      openIndex = index;
      activeIndex = index;
      contentArea.classList.add('show');
      closeBtn.classList.add('show');
      projectTitle.textContent = projects[index].title;
      projectDesc.textContent = projects[index].desc;

      items.forEach((item, i) => {
        item.classList.toggle('active', i === index);
        item.classList.toggle('video-playing', i === index);
        item.style.opacity = i === index ? '1' : '.18';
        item.style.filter = i === index ? 'none' : 'blur(.8px)';
      });
    }

    closeBtn.addEventListener('click', () => {
      openIndex = -1;
      activeIndex = -1;
      contentArea.classList.remove('show');
      closeBtn.classList.remove('show');
      items.forEach(item => {
        item.classList.remove('active', 'video-playing');
        item.style.opacity = '1';
        item.style.filter = 'none';
      });
    });

    window.addEventListener('wheel', (e) => {
      if (openIndex !== -1) return;
      scrollTarget += e.deltaY * 0.9;
      const maxScroll = Math.max(0, track.scrollWidth - innerWidth + 120);
      scrollTarget = Math.max(0, Math.min(maxScroll, scrollTarget));
    }, { passive: true });

    window.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });

    function animate(){
      scrollCurrent += (scrollTarget - scrollCurrent) * 0.08;
      if (openIndex === -1) {
        track.style.transform = `translateX(${-scrollCurrent}px)`;
      }

      const viewportCenter = innerWidth * 0.5;
      const bumpRadius = innerWidth * 0.22;

      items.forEach((item, index) => {
        if (openIndex !== -1) {
          if (index === openIndex) {
            item.style.position = 'fixed';
            item.style.left = '50%';
            item.style.top = '50%';
            item.style.transform = 'translate(-50%, -50%) scale(2.25)';
            item.style.width = 'min(22vw, 320px)';
            item.style.height = 'min(32vw, 460px)';
            item.style.opacity = '1';
            item.style.filter = 'none';
            item.style.zIndex = '50';
          } else {
            item.style.position = 'relative';
            item.style.left = '';
            item.style.top = '';
            item.style.transform = '';
            item.style.width = '';
            item.style.height = '';
            item.style.zIndex = '1';
          }
          return;
        }

        item.style.position = 'relative';
        item.style.left = '';
        item.style.top = '';
        item.style.width = '';
        item.style.height = '';
        item.style.zIndex = '1';

        const rect = item.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const dist = center - viewportCenter;
        const progress = 1 - Math.min(1, Math.abs(dist) / bumpRadius);

        const isInBump = Math.abs(dist) < bumpRadius * 1.2;
        const bump = isInBump ? Math.pow(progress, 2.8) : 0;

        const lift = -bump * 28;
        const scale = 1 + bump * 0.11;
        const rotate = (dist / bumpRadius) * -2.2 * bump;
        const xShift = bump * 2 * Math.sign(dist || 1);

        item.style.transform = `translate3d(${xShift}px, ${lift}px, 0) rotate(${rotate}deg) scale(${scale})`;
        item.style.opacity = 0.9 + bump * 0.1;
        item.style.filter = `grayscale(${1 - bump}) brightness(${0.82 + bump * 0.25}) saturate(${0.95 + bump * 0.8})`;
      });

      fx += (mx - fx) * 0.12;
      fy += (my - fy) * 0.12;
      cursorFollower.style.left = fx + 'px';
      cursorFollower.style.top = fy + 'px';

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
